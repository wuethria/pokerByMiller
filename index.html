<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1f1f1f" />
  <title>Poker Preflop Trainer</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 14px;
      line-height: 1.4;
      color: #171717;
    }
    h1 { font-size: 1.35rem; margin-bottom: 14px; }
    h2 { margin: 0 0 12px; font-size: 1rem; }
    label { font-size: 0.92rem; color: #444; margin-bottom: 6px; display: inline-block; }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 270px;
      gap: 24px;
      align-items: start;
    }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .tab-btn {
      border: 1px solid #cfcfcf;
      border-radius: 999px;
      background: #f3f3f3;
      color: #333;
      padding: 7px 12px;
      cursor: pointer;
    }
    .tab-btn.active {
      background: #1f1f1f;
      color: #fff;
      border-color: #1f1f1f;
    }
    .panel { display: none; }
    .panel.active { display: block; }
    .stage {
      border: 1px solid #d5d5d5;
      border-radius: 14px;
      background: #fcfcfc;
      padding: 16px;
    }
    .stage-meta {
      border: 1px solid #e3e3e3;
      border-radius: 10px;
      background: #fff;
      padding: 10px 12px;
      margin-bottom: 16px;
    }
    .stage-meta-inner {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
    }
    .meta-item + .meta-item { margin-top: 10px; }
    .meta-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #6a6a6a;
      margin-bottom: 2px;
    }
    :root {
      --surface-muted: #f7f8fa;
      --border-muted: #dfe3e8;
      --chip-bg: #eceff3;
      --chip-border: #cfd5db;
      --chip-text: #3e4650;
      --task-border: #cfd9e7;
      --task-shadow: 0 4px 12px rgba(0, 0, 0, 0.06);
      --primary-bg: #1f1f1f;
      --primary-bg-hover: #111111;
      --primary-text: #ffffff;
    }
    .given-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #6a6a6a;
      margin-bottom: 6px;
    }
    .given-section {
      display: none;
    }
    .given-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }
    .chip {
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
      border-radius: 12px;
      padding: 5px 9px;
      font-size: 0.84rem;
      font-weight: 450;
      user-select: none;
      line-height: 1.1;
    }
    .chip--fixed {
      border: 1px solid var(--chip-border);
      background: var(--chip-bg);
      color: var(--chip-text);
      cursor: default;
      filter: saturate(0.75);
    }
    .chip-label {
      color: #65707b;
      font-size: 0.67rem;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      font-weight: 600;
    }
    .chip-value {
      color: #2f3741;
      font-size: 0.86rem;
      font-weight: 600;
    }
    .given-empty {
      margin-top: 4px;
      color: #8a94a1;
      font-size: 1rem;
      line-height: 1;
    }
    .task-card {
      border: 1px solid var(--task-border);
      border-radius: 12px;
      background: #ffffff;
      box-shadow: var(--task-shadow);
      padding: 16px;
    }
    #playTaskCard,
    #learnTaskCard {
      min-height: var(--task-card-fixed-height, auto);
      height: auto;
      box-sizing: border-box;
    }
    .task-card.task-refresh {
      animation: taskRefresh 190ms ease;
    }
    .task-value {
      margin-top: 6px;
      color: #0f2747;
      font-size: 1.45rem;
      line-height: 1.2;
      font-weight: 800;
    }
    .task-context {
      margin-top: 8px;
      color: #3f4e61;
      font-size: 0.9rem;
      line-height: 1.35;
    }
    .task-focus {
      text-align: center;
      margin-top: 30px;
      margin-bottom: 8px;
    }
    .task-lines {
      margin-top: 6px;
    }
    .task-lines-centered {
      text-align: center;
    }
    .context-block {
      width: 100%;
      max-width: 880px;
      box-sizing: border-box;
      margin: 0 auto;
      padding: 12px 14px;
      border: 1px solid #e2e7ef;
      border-radius: 12px;
      background: #f9fbff;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.03);
    }
    .context-line {
      margin-top: 8px;
      margin-bottom: 0;
      color: #46556b;
      font-size: 1rem;
      line-height: 1.45;
      font-weight: 450;
    }
    .context-line:first-child {
      margin-top: 0;
    }
    .context-chip {
      display: inline-block;
      padding: 2px 9px;
      margin: 0 1px;
      border-radius: 999px;
      background: #e8eef8;
      border: 1px solid #d1dbe9;
      color: #2f4a70;
      font-weight: 600;
      white-space: nowrap;
    }
    .category-card {
      width: 100%;
      max-width: 760px;
      box-sizing: border-box;
      margin: 40px auto 0;
      border: 1px solid #d8e0ec;
      border-radius: 14px;
      background: #fcfdff;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.04);
      padding: 24px 16px;
      text-align: center;
    }
    .task-zone {
      width: 100%;
      max-width: 900px;
      box-sizing: border-box;
      margin: 30px auto 0;
      padding-top: 18px;
      border-top: 1px solid #e6ebf3;
      background: rgba(255, 255, 255, 0.45);
      border-radius: 10px;
    }
    #learnTaskCard {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }
    #learnTaskCard .action-row {
      margin-top: 12px;
    }
    #learnTaskLines {
      min-height: 0;
    }
    #learnTaskCategory {
      position: static;
      width: 100%;
      margin: 10px 0 4px;
      text-align: center;
      pointer-events: auto;
      font-size: 2.25rem;
      line-height: 1.15;
    }
    #learnCategoryLead {
      margin-top: 0;
      margin-bottom: 8px;
      text-align: center;
      color: #5a6b82;
      font-size: 0.95rem;
      line-height: 1.3;
      font-weight: 500;
    }
    #learnPrompt {
      margin-top: 30px;
      margin-bottom: 12px;
    }
    #learnLineAction {
      display: none;
    }
    .task-line {
      margin-top: 4px;
      color: #3f4e61;
      font-size: 0.95rem;
      line-height: 1.35;
    }
    .task-line--fixed {
      display: inline-block;
      margin-top: 8px;
      padding: 5px 11px;
      border-radius: 12px;
      border: 1px solid var(--chip-border);
      background: var(--chip-bg);
      color: var(--chip-text);
      filter: saturate(0.75);
      font-weight: 600;
    }
    .task-question {
      text-align: center;
      margin-top: 2px;
      margin-bottom: 8px;
      color: #2b3542;
      font-weight: 700;
      font-size: 0.96rem;
    }
    #playScenarioLines {
      margin-bottom: 46px;
    }
    #playDecisionPrompt {
      margin-top: 40px;
      margin-bottom: 18px;
    }
    #actions {
      margin-bottom: 40px;
    }
    .action-row {
      display: flex;
      justify-content: center;
      margin-top: 12px;
    }
    .learn-review-actions {
      display: flex;
      gap: 8px;
    }
    .learn-review-actions button {
      min-width: 110px;
    }
    .primary-btn {
      border: 1px solid var(--primary-bg);
      border-radius: 8px;
      background: var(--primary-bg);
      color: var(--primary-text);
      min-height: 42px;
      min-width: 150px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
    }
    .primary-btn:hover { background: var(--primary-bg-hover); }
    .primary-btn:active { transform: translateY(1px); }
    .primary-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }
    @keyframes taskRefresh {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .row { margin: 14px 0; }
    select, button {
      font-size: 0.95rem;
      padding: 8px 10px;
    }
    select {
      width: 100%;
      border: 1px solid #cfcfcf;
      border-radius: 8px;
      background: #fff;
      min-height: 42px;
    }
    .config {
      border: 1px solid #dddddd;
      border-radius: 12px;
      background: #fff;
      padding: 14px;
      position: sticky;
      top: 12px;
    }
    .config-controls > * + * { margin-top: 10px; }
    .subtle-btn {
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      background: #f4f4f4;
      color: #444;
      min-height: 42px;
      cursor: pointer;
    }
    .subtle-btn:hover { background: #ececec; }
    .subtle-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }
    .cards {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 28px 0 22px;
    }
    .cards.played .card {
      opacity: 0.55;
      filter: grayscale(80%);
    }
    .cards.played .hand-tag {
      opacity: 0.55;
    }
    .card {
      width: 96px;
      height: 136px;
      border: 2px solid #222;
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 8px;
      box-sizing: border-box;
      user-select: none;
    }
    .card-rank {
      font-size: 1.7rem;
      font-weight: 700;
      line-height: 1;
    }
    .card-suit {
      font-size: 1.35rem;
      line-height: 1;
    }
    .card-suit-big {
      text-align: center;
      font-size: 2.6rem;
      line-height: 1;
      margin-top: -6px;
      margin-bottom: -4px;
    }
    .card.red { color: #c22828; }
    .card.black { color: #111; }
    .card.reveal {
      animation: revealBorder 0.5s ease;
    }
    @keyframes revealBorder {
      0% {
        border-color: #000;
        border-width: 4px;
        box-shadow: 0 0 0 2px #000;
      }
      100% {
        border-color: #222;
        border-width: 2px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
      }
    }
    .hand-tag {
      flex: 0 0 100%;
      order: 99;
      text-align: center;
      margin-top: 6px;
      font-weight: bold;
      font-size: 1rem;
      color: #444;
      margin-left: 0;
    }
    .scenario {
      margin: 0;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
    }
    .stats {
      border: 2px solid #d8d8d8;
      border-radius: 8px;
      background: #f7f7f7;
      padding: 12px 14px;
      font-size: 0.95rem;
      margin-top: 24px;
    }
    .learn-card {
      border: 1px solid #d5d5d5;
      border-radius: 14px;
      background: #fcfcfc;
      padding: 16px;
    }
    .learn-stage {
      border: 1px solid #d5d5d5;
      border-radius: 14px;
      background: #fcfcfc;
      padding: 16px;
    }
    .learn-header {
      border: 1px solid #e3e3e3;
      border-radius: 10px;
      background: #fff;
      padding: 10px 12px;
      margin-bottom: 14px;
    }
    .learn-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #6a6a6a;
      margin-bottom: 2px;
    }
    .learn-answer-wrap {
      margin-top: 12px;
      min-height: 120px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      width: 100%;
    }
    .learn-value {
      display: inline-block;
      margin-top: 2px;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-weight: 600;
    }
    .learn-value.fixed {
      background: #f1ece2;
      border-color: #d5c6a6;
      color: #4f3f1e;
    }
    .learn-value.random {
      background: #e8f0fb;
      border-color: #bad0ee;
      color: #27486b;
    }
    @media (prefers-reduced-motion: reduce) {
      .task-card.task-refresh {
        animation: none;
      }
    }
    .learn-input {
      width: 100%;
      border: 1px solid #cfcfcf;
      border-radius: 8px;
      min-height: 42px;
      padding: 8px 10px;
      font-size: 0.95rem;
      box-sizing: border-box;
      margin-bottom: 10px;
    }
    .learn-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .learn-actions button {
      border: 1px solid #cfcfcf;
      border-radius: 8px;
      background: #fff;
      min-height: 42px;
      padding: 8px 12px;
      cursor: pointer;
    }
    .pdf-card {
      border: 1px solid #d5d5d5;
      border-radius: 14px;
      background: #fcfcfc;
      padding: 16px;
    }
    .pdf-frame-wrap {
      border: 1px solid #dadada;
      border-radius: 10px;
      background: #fff;
      overflow: hidden;
      height: 74vh;
      min-height: 520px;
    }
    .pdf-frame {
      width: 100%;
      height: 100%;
      border: 0;
    }
    .pdf-actions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pdf-actions a {
      border: 1px solid #cfcfcf;
      border-radius: 8px;
      background: #fff;
      color: #222;
      text-decoration: none;
      padding: 8px 12px;
    }
    .actions button {
      min-width: 110px;
      min-height: 44px;
      border: 1px solid #cfcfcf;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
    }
    .result {
      margin-top: 14px;
      padding: 10px;
      border-radius: 6px;
      display: block;
      max-width: none;
    }
    #result {
      width: min(980px, 96%);
      margin-left: auto;
      margin-right: auto;
      text-align: left;
    }
    .ok { background: #d7f5dd; }
    .bad { background: #ffd9d9; }
    .neutral { background: #eef1f4; }
    #learnResult {
      text-align: center;
      font-size: 1.4rem;
      font-weight: 700;
      border: 1px solid #d3d9e0;
      width: min(560px, 90%);
      max-width: 100%;
      white-space: pre-wrap;
      line-height: 1.35;
      box-sizing: border-box;
    }
    .muted { color: #555; }
    @media (max-width: 1100px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .config {
        position: static;
      }
      .action-row {
        justify-content: center;
      }
      .primary-btn {
        width: 100%;
      }
      #learnTaskCard {
        min-height: auto;
      }
      #learnTaskCard .action-row {
        margin-top: 10px;
      }
      .context-block {
        padding: 10px 10px;
      }
      .context-line {
        font-size: 0.96rem;
      }
      .category-card {
        margin-top: 22px;
        padding: 16px 12px;
      }
      #learnTaskCategory {
        width: 100%;
        margin: 6px 0 2px;
        font-size: 1.9rem;
      }
      #learnPrompt {
        margin-top: 10px;
        margin-bottom: 10px;
      }
      .task-zone {
        margin-top: 16px;
        padding-top: 12px;
      }
      .learn-answer-wrap {
        margin-top: 8px;
        min-height: 72px;
      }
      #learnResult {
        width: 100%;
      }
    }
    @media (max-width: 640px) {
      .actions button {
        width: 100%;
      }
      select, button {
        min-height: 44px;
      }
      .card {
        width: 84px;
        height: 120px;
      }
    }
  </style>
</head>
<body>
  <h1>Poker Preflop Trainer (nach PDF)</h1>
  <div class="tabs">
    <button id="tabPlay" class="tab-btn active">Hand-Entscheidung</button>
    <button id="tabLearn" class="tab-btn">Tabellen-Lernen</button>
    <button id="tabPdf" class="tab-btn">Strategie-PDF</button>
  </div>

  <section id="panelPlay" class="panel active">
    <div class="layout">
      <main class="stage">
        <section class="given-section" aria-label="Gegeben">
          <div class="given-title">Gegeben</div>
          <div id="playFixedChips" class="given-chips"></div>
          <div id="playNoFixed" class="given-empty">—</div>
        </section>

        <section id="playTaskCard" class="task-card" aria-label="Aufgabe">
          <div id="playScenarioLines" class="task-lines task-lines-centered context-block" aria-live="polite"></div>
          <div id="cards" class="cards"></div>
          <div id="playTaskZone" class="task-zone">
            <div id="playDecisionPrompt" class="task-question">Was machst du?</div>
            <div id="actions" class="actions row"></div>
            <div id="result" class="result" style="display:none;"></div>
            <div class="action-row">
              <button id="dealBtn" class="primary-btn">Neues Paar</button>
            </div>
          </div>
        </section>
      </main>

      <aside class="config">
        <h2>Konfiguration</h2>
        <div class="config-controls">
          <div>
            <label for="position">Position</label>
            <select id="position">
              <option value="ALL">alle</option>
              <option value="EP">EP</option>
              <option value="BLIND">Small Blind bzw. Blinds</option>
              <option value="BTN">Dealer</option>
              <option value="CO">CO</option>
            </select>
          </div>
          <div>
            <label for="condition">Initiative/Verteidigung</label>
            <select id="condition">
              <option value="ALL">alle</option>
              <option value="NO_RAISE">Pre-Flop Initiative</option>
              <option value="TIGHT_RAISE">Pre-Flop Verteidigung (Tight)</option>
              <option value="LOOSE_RAISE">Pre-Flop Verteidigung (Loose)</option>
            </select>
          </div>
          <div id="specialConditionWrap">
            <label for="specialCondition">Spezialbedingungen</label>
            <select id="specialCondition">
              <option value="ALL">alle</option>
              <option value="EP_STEAL">Early Position stealed</option>
              <option value="RAISE_GT_3BB">Erhoehung ist groesser als 3 Big Blinds</option>
              <option value="DEALER_CO_STEAL">Dealer/CO stealed</option>
            </select>
          </div>
        </div>
      </aside>
    </div>
  </section>

  <section id="panelLearn" class="panel">
    <div class="layout">
      <main class="learn-stage">
        <section class="given-section" aria-label="Gegeben">
          <div class="given-title">Gegeben</div>
          <div id="learnFixedChips" class="given-chips"></div>
          <div id="learnNoFixed" class="given-empty">—</div>
        </section>

        <section id="learnTaskCard" class="task-card" aria-label="Aufgabe">
          <div id="learnTaskLines" class="task-lines task-lines-centered context-block">
            <div id="learnLinePosition" class="task-line">-</div>
            <div id="learnLineArea" class="task-line">-</div>
            <div id="learnLineAction" class="task-line">-</div>
          </div>
          <div class="category-card">
            <div id="learnCategoryLead">Du hast Karten aus folgender Kategorie:</div>
            <div id="learnTaskCategory" class="task-value task-focus" aria-live="polite">-</div>
          </div>
          <div id="learnTaskZone" class="task-zone">
            <div id="learnPrompt" class="task-question">Bei welchen Kombinationen machst du ein -?</div>
            <div class="action-row">
              <button id="learnToggleBtn" class="primary-btn">Antwort anzeigen</button>
              <div id="learnReviewActions" class="learn-review-actions" style="display:none;">
                <button id="learnOkBtn" class="primary-btn">OK</button>
                <button id="learnNokBtn" class="subtle-btn">NOK</button>
              </div>
            </div>
            <div class="learn-answer-wrap">
              <div id="learnResult" class="result neutral" style="display:none;"></div>
            </div>
          </div>
        </section>
      </main>

      <aside class="config">
        <h2>Konfiguration</h2>
        <div class="config-controls">
          <div>
            <label for="learnCfgPosition">Position</label>
            <select id="learnCfgPosition">
              <option value="ALL">alle</option>
              <option value="EP">EP</option>
              <option value="BLIND">Small Blind bzw. Blinds</option>
              <option value="BTN">Dealer</option>
              <option value="CO">CO</option>
            </select>
          </div>
          <div>
            <label for="learnCfgArea">Initiative/Verteidigung</label>
            <select id="learnCfgArea">
              <option value="ALL">alle</option>
              <option value="INIT">Pre-Flop Initiative</option>
              <option value="TIGHT">Pre-Flop Verteidigung (Tight)</option>
              <option value="LOOSE">Pre-Flop Verteidigung (Loose)</option>
            </select>
          </div>
          <div id="learnCfgActionWrap">
            <label for="learnCfgAction">Aktion</label>
            <select id="learnCfgAction">
              <option value="ALL">alle</option>
                            <option value="CALL">Call</option>
              <option value="3BET">3-bet</option>
            </select>
          </div>
        </div>
      </aside>
    </div>
  </section>

  <section id="panelPdf" class="panel">
    <div class="pdf-card">
      <div class="pdf-frame-wrap">
        <iframe

    function idx(r) { return RANKS.indexOf(r); }

    function canonicalHand(c1, c2) {
      const r1 = c1[0], s1 = c1[1], r2 = c2[0], s2 = c2[1];
      if (r1 === r2) return r1 + r2;
      const i1 = idx(r1), i2 = idx(r2);
      const high = i1 < i2 ? r1 : r2;
      const low = i1 < i2 ? r2 : r1;
      const suited = s1 === s2 ? "s" : "o";
      return high + low + suited;
    }

    function dealTwoCards() {
      const deck = [];
      for (const r of RANKS) {
        for (const s of SUITS) deck.push(r + s);
      }
      const a = Math.floor(Math.random() * deck.length);
      const c1 = deck.splice(a, 1)[0];
      const b = Math.floor(Math.random() * deck.length);
      const c2 = deck.splice(b, 1)[0];
      return [c1, c2];
    }

    function matchToken(token, hand) {
      token = token.replace(/\([^)]*\)/g, "").trim();
      if (!token || token === "-") return false;
      if (token === "ALL_0G_S") {
        if (hand.length !== 3 || hand[2] !== "s") return false;
        return (idx(hand[1]) - idx(hand[0]) - 1) === 0;
      }
      if (token === "ALL_1G_S") {
        if (hand.length !== 3 || hand[2] !== "s") return false;
        return (idx(hand[1]) - idx(hand[0]) - 1) === 1;
      }
      if (token === "ALL_2G_S") {
        if (hand.length !== 3 || hand[2] !== "s") return false;
        return (idx(hand[1]) - idx(hand[0]) - 1) === 2;
      }

      if (token.includes("-")) {
        const [start, end] = token.split("-").map(t => t.trim());
        if (start.length === 2 && end.length === 2 && start[0] === start[1] && end[0] === end[1]) {
          if (hand.length !== 2 || hand[0] !== hand[1]) return false;
          const h = idx(hand[0]);
          return h >= idx(start[0]) && h <= idx(end[0]);
        }

        if (start.length !== 3 || end.length !== 3) return false;
        if (hand.length !== 3) return false;
        if (start[2] !== end[2] || hand[2] !== start[2]) return false;

        const s1 = idx(start[0]), s2 = idx(start[1]);
        const e1 = idx(end[0]), e2 = idx(end[1]);
        const d1 = Math.sign(e1 - s1);
        const d2 = Math.sign(e2 - s2);

        let i1 = s1, i2 = s2;
        for (let n = 0; n < 20; n++) {
          if (hand[0] === RANKS[i1] && hand[1] === RANKS[i2]) return true;
          if (i1 === e1 && i2 === e2) break;
          if (d1 !== 0) i1 += d1;
          if (d2 !== 0) i2 += d2;
        }
        return false;
      }

      if (token.endsWith("+")) {
        const base = token.slice(0, -1);
        if (base.length === 2 && base[0] === base[1]) {
          if (hand.length !== 2 || hand[0] !== hand[1]) return false;
          return idx(hand[0]) <= idx(base[0]);
        }
        if (base.length !== 3 || hand.length !== 3) return false;
        if (hand[0] !== base[0] || hand[2] !== base[2]) return false;
        return idx(hand[1]) <= idx(base[1]);
      }

      return token === hand;
    }

    function inRange(tokens, hand) {
      for (const token of tokens) {
        if (matchToken(token, hand)) return true;
      }
      return false;
    }

    function isSBOpen(hand) {
      if (hand.length === 2) return true;
      const hi = hand[0];
      const suited = hand[2] === "s";

      if (suited && ["A", "K", "Q", "J"].includes(hi)) return true;
      if (!suited && ["A", "K", "Q", "J"].includes(hi)) return true;

      if (suited) {
        const gap = idx(hand[1]) - idx(hand[0]) - 1;
        if (gap === 0 || gap === 1 || gap === 2) return true;
      }

      return false;
    }

    function isBlindCallCheck(hand) {
      if (hand.length === 2) return true;
      const hi = hand[0];
      if (["A", "K", "Q", "J"].includes(hi)) return true;
      const gap = idx(hand[1]) - idx(hand[0]) - 1;
      return gap === 0;
    }

      return all[Math.floor(Math.random() * all.length)];

    function actionLabel(action) {

    function joinRanges(tokens) {

    function resolveCorrectAction(hand, heroPos, scenario, raiserPos, specialCondition) {
      if (scenario === "NO_RAISE") {
        const raise = inRange(OPEN_INIT_RAISE[heroPos], hand);
        if (raise) {
          return {
            correct: "RAISE",
            tableLabel: "Tabelle 1: Pre-Flop Initiative",

          };

        if (heroPos === "BLIND" && isBlindCallCheck(hand)) {
          return {
            correct: "CALLCHECK",
            tableLabel: "Tabelle 1: Pre-Flop Initiative",
            reason: hand + " ist in der Call/Check-Range der Blinds."
          };
        }

        return {
          correct: "FOLD",
          tableLabel: "Tabelle 1: Pre-Flop Initiative",
          reason: heroPos === "BLIND"

            : hand + " ist nicht in der Raise-Range (" + joinRanges(OPEN_INIT_RAISE[heroPos]) + ")."
        };
      }

      let col;
      if (heroPos === "BLIND") {
        if (specialCondition === "EP_STEAL" || specialCondition === "RAISE_GT_3BB") {
          col = "EP";
        } else if (specialCondition === "DEALER_CO_STEAL") {
          col = "BLINDS";
        } else {
          col = raiserPos === "EP" ? "EP" : "BLINDS";
        }
      } else {
        col = heroPos;
      }

      const table = scenario === "TIGHT_RAISE" ? FACING_TIGHT : FACING_LOOSE;
      const cfg = table[col];
      const tableLabel = scenario === "TIGHT_RAISE"
        ? "Tabelle 2A: Facing Tight/Strong Raise"
        : "Tabelle 2B: Facing Loose Raise";

      if (inRange(cfg.threeBet, hand)) {
        return {
          correct: "3BET",
          tableLabel,
          reason: hand + " ist in der 3-Bet-Range (" + joinRanges(cfg.threeBet) + ")."
        };
      }
      if (inRange(cfg.call, hand)) {
        return {
          correct: "CALL",
          tableLabel,
          reason: hand + " ist in der Call-Range (" + joinRanges(cfg.call) + ")."
        };
      }
      return {
        correct: "FOLD",
        tableLabel,
        reason: hand + " ist weder in der Call-Range (" + joinRanges(cfg.call) + ") noch in der 3-Bet-Range (" + joinRanges(cfg.threeBet) + ")."
      };
    }

      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")

      return str.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");

    function formatContextText(text) {
      let out = escapeHtml(text);
      const highlights = [
        "Early Position",
        "Cutoff",
        "Button",
        "den Blinds",
        "Big Blind",
        "tighter Spieler",
        "looser Spieler",
        "geraised",
        "gecallt",
        "gefoldet",
        "Steal",
        "Dealer",
        "3 Big Blinds"

      for (const token of highlights) {

        out = out.replace(re, '<span class="context-chip">' + token + '</span>');
      }
      return out;

      else if (state.heroPos === "BTN") lines.push({ key: "position", text: "Du sitzt am Button." });
      else if (state.heroPos === "BLIND") lines.push({ key: "position", text: "Du sitzt in den Blinds." });

      if (state.scenario === "NO_RAISE") {

      } else if (state.scenario === "TIGHT_RAISE") {

      } else if (state.scenario === "LOOSE_RAISE") {

      }

      if (v === "EP_STEAL") return "Early Position stealed";
      if (v === "RAISE_GT_3BB") return "Erhoehung ist groesser als 3 Big Blinds";
      if (v === "DEALER_CO_STEAL") return "Dealer/CO stealed";
      return "";
    }

    function suitInfo(s) {
      if (s === "h") return { symbol: "♥", cls: "red" };
      if (s === "d") return { symbol: "♦", cls: "red" };
      if (s === "s") return { symbol: "♠", cls: "black" };
      return { symbol: "♣", cls: "black" };
    }

    function renderCards(c1, c2, hand, highlightNew) {
      const cards = document.getElementById("cards");
      cards.innerHTML = "";
      cards.classList.remove("played");

      for (const c of [c1, c2]) {
        const rank = c[0];
        const suit = suitInfo(c[1]);
        const el = document.createElement("div");
        el.className = "card " + suit.cls;
        if (highlightNew) el.classList.add("reveal");
        el.innerHTML =
          "<div><div class='card-rank'>" + rank + "</div><div class='card-suit'>" + suit.symbol + "</div></div>" +
          "<div class='card-suit-big'>" + suit.symbol + "</div>";
        cards.appendChild(el);
      }

      const tag = document.createElement("div");
      tag.className = "hand-tag";
      tag.textContent = "(" + hand + ")";
      cards.appendChild(tag);
    }

    function setActionButtonsDisabled(disabled) {
      const buttons = document.querySelectorAll("#actions button");
      for (const b of buttons) b.disabled = disabled;
    }

    function updateDealButton(state) {
      const b = document.getElementById("dealBtn");
      b.disabled = false;
      b.textContent = "Neues Paar";
    }

    function renderStats() {
      const el = document.getElementById("stats");
      if (!el) return;
      const hitRate = stats.total ? Math.round((stats.correct / stats.total) * 100) : 0;
      const pos = stats.byPos;
      const line = (k, label) => {
        const t = pos[k].total;
        const c = pos[k].correct;
        const p = t ? Math.round((c / t) * 100) : 0;
        return label + " " + c + "/" + t + " (" + p + "%)";
      };
      el.textContent =
        "Gesamt: " + stats.correct + "/" + stats.total + " (" + hitRate + "%) | " +
        line("EP", "early:") + " | " +
        line("CO", "CO:") + " | " +
        line("BTN", "Dealer:") + " | " +
        line("BLIND", "Blind:");
    }

    function setTab(tab) {
      document.getElementById("panelPlay").classList.toggle("active", tab === "play");
      document.getElementById("panelLearn").classList.toggle("active", tab === "learn");
      document.getElementById("panelPdf").classList.toggle("active", tab === "pdf");
      document.getElementById("tabPlay").classList.toggle("active", tab === "play");
      document.getElementById("tabLearn").classList.toggle("active", tab === "learn");
      document.getElementById("tabPdf").classList.toggle("active", tab === "pdf");
    }

    function buildLearnQuestions() {
      const posOrder = ["EP", "BLIND", "BTN", "CO"];
      const posName = { EP: "EP", BLIND: "Small Blind bzw. Blinds", BTN: "Dealer", CO: "CO" };

      for (const row of LEARN_OPEN) {
        for (const pos of posOrder) {
          const cfg = row[pos];
          learnQuestions.push({
            areaKey: "INIT",
            area: "Pre-Flop Initiative",
            category: row.category,
            positionKey: pos,
            position: posName[pos],
            actionKey: "RAISE",
            action: "Raise",
            answer: cfg.raise
          });
          learnQuestions.push({
            areaKey: "INIT",
            area: "Pre-Flop Initiative",
            category: row.category,
            positionKey: pos,
            position: posName[pos],
            actionKey: "CALLCHECK",
            action: "Call/Check",
            answer: cfg.callCheck
          });
        }
      }

      for (const row of LEARN_TIGHT) {
        for (const pos of posOrder) {
          learnQuestions.push({
            areaKey: "TIGHT",
            area: "Pre-Flop Verteidigung (Tight)",
            category: row.category,
            positionKey: pos,
            position: posName[pos],
            actionKey: "CALL",
            action: "Call",
            answer: row[pos].call
          });
          learnQuestions.push({
            areaKey: "TIGHT",
            area: "Pre-Flop Verteidigung (Tight)",
            category: row.category,
            positionKey: pos,
            position: posName[pos],
            actionKey: "3BET",
            action: "3-bet",
            answer: row[pos].threeBet
          });
        }
      }

      for (const row of LEARN_LOOSE) {
        for (const pos of posOrder) {
          learnQuestions.push({
            areaKey: "LOOSE",
            area: "Pre-Flop Verteidigung (Loose)",
            category: row.category,
            positionKey: pos,
            position: posName[pos],
            actionKey: "CALL",
            action: "Call",
            answer: row[pos].call
          });
          learnQuestions.push({
            areaKey: "LOOSE",
            area: "Pre-Flop Verteidigung (Loose)",
            category: row.category,
            positionKey: pos,
            position: posName[pos],
            actionKey: "3BET",
            action: "3-bet",
            answer: row[pos].threeBet
          });
        }
      }
    }

    function setSelectOptions(select, items, preferred) {
      select.innerHTML = items.map((item) => '<option value="' + item.value + '">' + item.label + '</option>').join('');
      const allowed = new Set(items.map((item) => item.value));
      select.value = allowed.has(preferred) ? preferred : items[0].value;
    }

    function applyLearnAreaModeUI() {
      const areaSelect = document.getElementById("learnCfgArea");
      const actionWrap = document.getElementById("learnCfgActionWrap");
      const actionSelect = document.getElementById("learnCfgAction");
      const actionLine = document.getElementById("learnLineAction");

      const currentArea = areaSelect.value || "ALL";
      const currentAction = actionSelect.value || "ALL";

      actionWrap.style.display = "block";
      actionLine.style.display = "block";
      actionLine.style.visibility = "visible";

      let areaItems = [
        { value: "ALL", label: "alle" },
        { value: "INIT", label: "Pre-Flop Initiative" },
        { value: "TIGHT", label: "Pre-Flop Verteidigung (Tight)" },
        { value: "LOOSE", label: "Pre-Flop Verteidigung (Loose)" }
      ];

      if (currentAction === "RAISE" || currentAction === "CALLCHECK") {
        areaItems = areaItems.filter((item) => item.value === "ALL" || item.value === "INIT");
      } else if (currentAction === "CALL" || currentAction === "3BET") {
        areaItems = areaItems.filter((item) => item.value === "ALL" || item.value === "TIGHT" || item.value === "LOOSE");
      }

      setSelectOptions(areaSelect, areaItems, currentArea);
      const effectiveArea = areaSelect.value;

      let actionItems;
      if (effectiveArea === "INIT") {
        actionItems = [
          { value: "ALL", label: "alle" },
          { value: "RAISE", label: "Raise" },
          { value: "CALLCHECK", label: "Call/Check" }
        ];
      } else if (effectiveArea === "TIGHT" || effectiveArea === "LOOSE") {
        actionItems = [
          { value: "ALL", label: "alle" },
          { value: "CALL", label: "Call" },
          { value: "3BET", label: "3-bet" }
        ];
      } else {
        actionItems = [
          { value: "ALL", label: "alle" },
          { value: "RAISE", label: "Raise" },
          { value: "CALLCHECK", label: "Call/Check" },
          { value: "CALL", label: "Call" },
          { value: "3BET", label: "3-bet" }
        ];
      }

      setSelectOptions(actionSelect, actionItems, currentAction);
    }

    function filteredLearnQuestions() {
      const area = document.getElementById("learnCfgArea").value;
      const pos = document.getElementById("learnCfgPosition").value;
      const rawAction = document.getElementById("learnCfgAction").value;
      const action = rawAction === "" ? "ALL" : rawAction;
      const useAction = area !== "INIT";

      return learnQuestions.filter((q) =>
        (area === "ALL" || q.areaKey === area) &&
        (pos === "ALL" || q.positionKey === pos) &&
        (!useAction || action === "ALL" || q.actionKey === action)
      );
    }

    function renderFixedChips(containerId, emptyId, chips) {
      const host = document.getElementById(containerId);
      const empty = document.getElementById(emptyId);
      host.innerHTML = "";
      for (const chip of chips) {
        if (isPlaceholderValue(chip.value)) continue;
        const el = document.createElement("span");
        el.className = "chip chip--fixed";
        el.innerHTML = "<span class='chip-label'>" + chip.label + "</span>" +
          "<span class='chip-value'>" + chip.value + "</span>";
        host.appendChild(el);
      }
      empty.style.display = chips.length ? "none" : "block";
    }

    function renderPlayFixedChips() {
      const chips = [];
      const cond = document.getElementById("condition").value;
      const pos = document.getElementById("position").value;
      if (pos !== "ALL") {
        chips.push({ label: "Position", value: getSelectText("position", pos) });
      }
      if (cond !== "ALL") {
        chips.push({ label: "Initiative/Verteidigung", value: getSelectText("condition", cond) });
      }
      const sp = document.getElementById("specialCondition").value;
      if (cond === "LOOSE_RAISE" && (pos === "ALL" || pos === "BLIND") && sp !== "ALL") {
        chips.push({ label: "Spezialbedingungen", value: getSelectText("specialCondition", sp) });
      }
      renderFixedChips("playFixedChips", "playNoFixed", chips);
    }

    function applyPlaySpecialModeUI() {
      const cond = document.getElementById("condition").value;
      const pos = document.getElementById("position").value;
      const wrap = document.getElementById("specialConditionWrap");
      const select = document.getElementById("specialCondition");
      const enabled = cond === "LOOSE_RAISE" && (pos === "ALL" || pos === "BLIND");
      wrap.style.display = enabled ? "block" : "none";
      select.disabled = !enabled;
      if (!enabled) select.value = "ALL";
    }

    function getSelectText(selectId, value) {
      const sel = document.getElementById(selectId);
      const opt = Array.from(sel.options).find((o) => o.value === value);
      return opt ? opt.textContent : value;
    }

    function setTaskLineValue(el, text, fixed) {
      el.className = "task-line context-line" + (fixed ? " task-line--fixed" : "");
      el.innerHTML = formatContextText(text);
    }

    function renderLearnFixedChips() {
      const areaCfg = document.getElementById("learnCfgArea").value;
      const posCfg = document.getElementById("learnCfgPosition").value;
      const actionCfg = document.getElementById("learnCfgAction").value;
      const chips = [];

      if (areaCfg !== "ALL") {
        chips.push({ label: "Initiative/Verteidigung", value: getSelectText("learnCfgArea", areaCfg) });
      }
      if (posCfg !== "ALL") {
        chips.push({ label: "Position", value: getSelectText("learnCfgPosition", posCfg) });
      }
      if (actionCfg !== "ALL") {
        chips.push({ label: "Aktion", value: getSelectText("learnCfgAction", actionCfg) });
      }

      renderFixedChips("learnFixedChips", "learnNoFixed", chips);
    }

    function animateTaskCard(cardId) {
      const card = document.getElementById(cardId);
      card.classList.remove("task-refresh");
      void card.offsetWidth;
      card.classList.add("task-refresh");
    }

    function syncTaskCardHeights() {
      const root = document.documentElement;
      const play = document.getElementById("playTaskCard");
      if (!play) return;
      root.style.removeProperty("--task-card-fixed-height");
      const h = Math.round(play.getBoundingClientRect().height);
      if (h > 0) root.style.setProperty("--task-card-fixed-height", h + "px");
    }

    function learnComboSignature(q) {
      return [q.areaKey, q.positionKey, q.actionKey, q.category].join("|");
    }

    function setLearnActionState(mode) {
      const showBtn = document.getElementById("learnToggleBtn");
      const review = document.getElementById("learnReviewActions");
      if (mode === "review") {
        showBtn.style.display = "none";
        review.style.display = "flex";
      } else {
        showBtn.style.display = "inline-block";
        review.style.display = "none";
      }
    }

    function resetLearnReviewQueue() {
      learnReviewQueue = [];
      learnSinceLastReview = 0;
    }

    function pickLearnQuestion(pool) {
      const bySig = new Map(pool.map((q) => [learnComboSignature(q), q]));
      learnReviewQueue = learnReviewQueue.filter((sig) => bySig.has(sig));

      if (learnReviewQueue.length > 0 && learnSinceLastReview >= 2) {
        const sig = learnReviewQueue[0];
        const q = bySig.get(sig);
        if (q) {
          learnSinceLastReview = 0;
          return { question: q, isReview: true };
        }
      }

      const q = pool[Math.floor(Math.random() * pool.length)];
      if (learnReviewQueue.length > 0) {
        learnSinceLastReview += 1;
      } else {
        learnSinceLastReview = 0;
      }
      return { question: q, isReview: false };
    }


    function nextLearnQuestion() {
      applyLearnAreaModeUI();
      renderLearnFixedChips();
      const pool = filteredLearnQuestions();
      const res = document.getElementById("learnResult");

      if (!pool.length) {
        learnCurrent = null;
        document.getElementById("learnTaskCategory").textContent = "-";
        document.getElementById("learnPrompt").textContent = "Bei welchen Kombinationen machst du ein -?";
        const lineArea = document.getElementById("learnLineArea");
        const linePos = document.getElementById("learnLinePosition");
        const lineAction = document.getElementById("learnLineAction");
        setTaskLineValue(lineArea, "-", false);
        setTaskLineValue(linePos, "-", false);
        setTaskLineValue(lineAction, "-", false);
        lineAction.style.display = "none";
        res.style.display = "block";
        res.className = "result neutral";
        res.textContent = "Keine Frage fuer diese Filter-Kombination vorhanden.";
        const btn = document.getElementById("learnToggleBtn");
        btn.textContent = "Antwort anzeigen";
        btn.disabled = true;
        setLearnActionState("show");
        return;
      }

      const picked = pickLearnQuestion(pool);
      const q = picked.question;
      learnCurrent = { ...q, isReview: picked.isReview };
      learnAnswerVisible = false;

      const lineArea = document.getElementById("learnLineArea");
      const linePos = document.getElementById("learnLinePosition");
      const lineAction = document.getElementById("learnLineAction");
      const areaCfg = document.getElementById("learnCfgArea").value;
      const posCfg = document.getElementById("learnCfgPosition").value;

      setTaskLineValue(linePos, learnPositionScenarioLine(q.positionKey), posCfg !== "ALL");
      setTaskLineValue(lineArea, learnAreaScenarioLine(q.areaKey), areaCfg !== "ALL");
      setTaskLineValue(lineAction, q.action, false);
      lineAction.style.display = "none";

      document.getElementById("learnTaskCategory").textContent = q.category;
      document.getElementById("learnPrompt").textContent = "Bei welchen Kombinationen machst du ein " + q.action + "?";
      animateTaskCard("learnTaskCard");

      const btn = document.getElementById("learnToggleBtn");
      btn.textContent = "Antwort anzeigen";
      btn.disabled = false;
      setLearnActionState("show");
      res.style.display = "none";
    }
    function normalizeLearnAnswer(answer) {
      let text = String(answer || "-").replace(/\r\n/g, "\n");
      text = text.replace(/\s*\|\s*/g, "\n");
      text = text.replace(/\n{3,}/g, "\n\n");
      text = text.replace(/\n+$/g, "");
      return text || "-";
    }

    function toggleLearnAnswer() {
      if (!learnCurrent || learnAnswerVisible) return;
      const res = document.getElementById("learnResult");
      res.style.display = "block";
      res.className = "result neutral";
      res.textContent = normalizeLearnAnswer(learnCurrent.answer);
      learnAnswerVisible = true;
      setLearnActionState("review");
    }

    function learnReviewAnswer(ok) {
      if (!learnCurrent || !learnAnswerVisible) return;
      const sig = learnComboSignature(learnCurrent);
      const inQueue = learnReviewQueue.includes(sig);

      if (ok) {
        if (learnCurrent.isReview) {
          learnReviewQueue = learnReviewQueue.filter((x) => x !== sig);
        }
      } else {
        if (!inQueue) {
          learnReviewQueue.push(sig);
        }
      }

      nextLearnQuestion();
    }

    function renderActions(scenario) {
      const actions = document.getElementById("actions");
      actions.innerHTML = "";

      const options = scenario === "NO_RAISE"
        ? [{ id: "RAISE", text: "Raise" }, { id: "CALLCHECK", text: "Call/Check" }, { id: "FOLD", text: "Fold" }]
        : [{ id: "CALL", text: "Call" }, { id: "3BET", text: "3-Bet" }, { id: "FOLD", text: "Fold" }];

      for (const opt of options) {
        const b = document.createElement("button");
        b.textContent = opt.text;
        b.onclick = () => answer(opt.id);
        actions.appendChild(b);
      }
    }

    function answer(choice) {
      if (!current || current.locked) return;
      current.locked = true;
      const res = document.getElementById("result");
      const ok = choice === current.correct;
      document.getElementById("cards").classList.add("played");
      setActionButtonsDisabled(true);
      updateDealButton("ready");

      stats.total += 1;
      stats.byPos[current.heroPos].total += 1;
      if (ok) {
        stats.correct += 1;
        stats.byPos[current.heroPos].correct += 1;
      } else {
        stats.wrong += 1;
      }
      renderStats();

      res.style.display = "block";
      res.className = "result " + (ok ? "ok" : "bad");
      res.textContent = ok
        ? "✔ Richtig. " + current.reason
        : "✘ Falsch. Korrekt ist: " + actionLabel(current.correct) + ". " + current.reason;

      if (resolveTimer) clearTimeout(resolveTimer);
      updateDealButton("ready");
    }

    function nextHand(highlightNew = false) {
      if (resolveTimer) {
        clearTimeout(resolveTimer);
        resolveTimer = null;
      }
      updateDealButton("ready");
      const selected = document.getElementById("position").value;
      const selectedCondition = document.getElementById("condition").value;
      const selectedSpecial = document.getElementById("specialCondition").value;
      let heroPos = getPosition(selected);
      const scenario = getScenario(selectedCondition);
      if (selected === "ALL" && selectedCondition === "LOOSE_RAISE" && selectedSpecial !== "ALL") {
        heroPos = "BLIND";
      }
      const specialCondition = (scenario === "LOOSE_RAISE" && heroPos === "BLIND") ? selectedSpecial : "ALL";
      const [c1, c2] = dealTwoCards();
      const hand = canonicalHand(c1, c2);

      let raiserPos = null;
      if (heroPos === "BLIND" && scenario !== "NO_RAISE") {
        if (specialCondition === "EP_STEAL" || specialCondition === "RAISE_GT_3BB") {
          raiserPos = "EP";
        } else if (specialCondition === "DEALER_CO_STEAL") {
          raiserPos = Math.random() < 0.5 ? "CO" : "BTN";
        } else {
          const possible = ["EP", "CO", "BTN"];
          raiserPos = possible[Math.floor(Math.random() * possible.length)];
        }
      }

      const resolved = resolveCorrectAction(hand, heroPos, scenario, raiserPos, specialCondition);
      current = {
        hand,
        heroPos,
        scenario,
        raiserPos,
        specialCondition,
        correct: resolved.correct,
        tableLabel: resolved.tableLabel,
        reason: resolved.reason,
        locked: false
      };

      renderPlayScenarioLines(
        {
          heroPos,
          scenario,
          specialCondition,
          raiserPos
        },
        {
          position: selected !== "ALL",
          scenario: selectedCondition !== "ALL",
          special: specialCondition !== "ALL"
        }
      );

      renderCards(c1, c2, hand, false);
      renderPlayFixedChips();
      if (highlightNew) animateTaskCard("playTaskCard");
      document.getElementById("result").style.display = "none";
      renderActions(scenario);
      setActionButtonsDisabled(false);
      syncTaskCardHeights();
    }

    document.getElementById("dealBtn").addEventListener("click", () => nextHand(true));
    document.getElementById("tabPlay").addEventListener("click", () => setTab("play"));
    document.getElementById("tabLearn").addEventListener("click", () => setTab("learn"));
    document.getElementById("tabPdf").addEventListener("click", () => setTab("pdf"));
    document.getElementById("learnToggleBtn").addEventListener("click", toggleLearnAnswer);
    document.getElementById("learnOkBtn").addEventListener("click", () => learnReviewAnswer(true));
    document.getElementById("learnNokBtn").addEventListener("click", () => learnReviewAnswer(false));
    const onLearnConfigChange = () => {
      resetLearnReviewQueue();
      nextLearnQuestion();
    };
    document.getElementById("learnCfgArea").addEventListener("change", onLearnConfigChange);
    document.getElementById("learnCfgPosition").addEventListener("change", onLearnConfigChange);
    document.getElementById("learnCfgAction").addEventListener("change", onLearnConfigChange);
    document.getElementById("condition").addEventListener("change", () => { applyPlaySpecialModeUI(); nextHand(true); });
    document.getElementById("position").addEventListener("change", () => { applyPlaySpecialModeUI(); nextHand(true); });
    document.getElementById("specialCondition").addEventListener("change", () => nextHand(true));

    buildLearnQuestions();

    applyPlaySpecialModeUI();
    renderStats();
    nextHand();
    nextLearnQuestion();

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
