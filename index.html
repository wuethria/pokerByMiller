<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1f1f1f" />
  <title>Poker Trainer (by Ed Miller)</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 14px;
      line-height: 1.4;
      color: #171717;
      background:
        radial-gradient(1200px 520px at 50% -260px, #e8f4ed 0%, #f6f8f6 52%, #fafafa 100%),
        linear-gradient(#fafafa, #fafafa);
    }
    html, body {
      overflow-x: hidden;
    }
    h1 { font-size: 1.35rem; margin: 0; }
    .title-row {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      margin-bottom: 14px;
    }
    body::before {
      content: "";
      position: fixed;
      top: -130px;
      right: -130px;
      width: 460px;
      height: 460px;
      background: url("icons/poker-chip.png") no-repeat center/contain;
      opacity: 0.09;
      pointer-events: none;
      z-index: 0;
      filter: saturate(0.85);
    }
    body > * {
      position: relative;
      z-index: 1;
    }
    h2 { margin: 0 0 12px; font-size: 1rem; }
    label { font-size: 0.92rem; color: #444; margin-bottom: 6px; display: inline-block; }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 270px;
      gap: 24px;
      align-items: start;
    }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .tab-btn {
      flex: 1 1 0;
      min-width: 0;
      border: 1px solid #cfcfcf;
      border-radius: 999px;
      background: #f3f3f3;
      color: #333;
      padding: 7px 12px;
      cursor: pointer;
    }
    .tab-btn.active {
      background: #e8edf4;
      color: #22364f;
      border-color: #b8c5d6;
      font-weight: 700;
    }
    .panel { display: none; overflow-x: hidden; }
    .panel.active { display: block; }
    .stage {
      border: 1px solid #d5d5d5;
      border-radius: 14px;
      background: #fcfcfc;
      padding: 16px;
    }
    .stage-meta {
      border: 1px solid #e3e3e3;
      border-radius: 10px;
      background: #fff;
      padding: 10px 12px;
      margin-bottom: 16px;
    }
    .stage-meta-inner {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
    }
    .meta-item + .meta-item { margin-top: 10px; }
    .meta-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #6a6a6a;
      margin-bottom: 2px;
    }
    :root {
      --surface-muted: #f7f8fa;
      --border-muted: #dfe3e8;
      --chip-bg: #eceff3;
      --chip-border: #cfd5db;
      --chip-text: #3e4650;
      --task-border: #cfd9e7;
      --task-shadow: 0 4px 12px rgba(0, 0, 0, 0.06);
      --primary-bg: #1f1f1f;
      --primary-bg-hover: #111111;
      --primary-text: #ffffff;
      --learn-action-width: 560px;
      --play-zone-gap: 22px;
      --play-top-min-height: 430px;
    }
    .given-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #6a6a6a;
      margin-bottom: 6px;
    }
    .given-section {
      display: none;
    }
    .given-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 3px;
    }
    .chip {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      border-radius: 12px;
      padding: 5px 9px;
      font-size: 0.84rem;
      font-weight: 450;
      user-select: none;
      line-height: 1.1;
    }
    .chip--fixed {
      border: 1px solid var(--chip-border);
      background: var(--chip-bg);
      color: var(--chip-text);
      cursor: default;
      filter: saturate(0.75);
    }
    .chip-label {
      color: #65707b;
      font-size: 0.67rem;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      font-weight: 600;
    }
    .chip-value {
      color: #2f3741;
      font-size: 0.86rem;
      font-weight: 600;
    }
    .given-empty {
      margin-top: 4px;
      color: #8a94a1;
      font-size: 1rem;
      line-height: 1;
    }
    .task-card {
      border: 1px solid var(--task-border);
      border-radius: 12px;
      background: #ffffff;
      box-shadow: var(--task-shadow);
      padding: 16px;
    }
    #playTaskCard,
    #learnTaskCard {
      min-height: var(--task-card-fixed-height, auto);
      height: auto;
      box-sizing: border-box;
      border: 0;
      background: transparent;
      box-shadow: none;
      padding: 0;
    }
    #playTaskCard {
      padding-bottom: 0;
    }
    .task-card.task-refresh {
      animation: none;
    }
    .task-value {
      margin-top: 6px;
      color: #0f2747;
      font-size: 1.45rem;
      line-height: 1.2;
      font-weight: 800;
    }
    .task-context {
      margin-top: 8px;
      color: #3f4e61;
      font-size: 0.9rem;
      line-height: 1.35;
    }
    .task-focus {
      text-align: center;
      margin-top: 30px;
      margin-bottom: 8px;
    }
    .task-lines {
      margin-top: 6px;
    }
    .task-lines-centered {
      text-align: center;
    }
    .context-block {
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      margin: 0 auto;
      padding: 12px 14px;
      border: 1px solid #e2e7ef;
      border-radius: 12px;
      background: #f9fbff;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.03);
    }
    .context-line {
      margin-top: 8px;
      margin-bottom: 0;
      color: #46556b;
      font-size: 1rem;
      line-height: 1.45;
      font-weight: 450;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      column-gap: 6px;
      width: 100%;
      text-align: left;
      box-sizing: border-box;
    }
    .context-line:first-child {
      margin-top: 0;
    }
    .context-prefix {
      display: inline-block;
      grid-column: 1;
      justify-self: start;
      text-align: left;
      white-space: nowrap;
    }
    .context-main {
      display: inline-block;
      grid-column: 2;
      justify-self: center;
      text-align: center;
    }
    .context-prefix-only {
      display: block;
      grid-column: 1 / -1;
      justify-self: start;
      width: 100%;
      text-align: left;
    }
    .context-chip {
      display: inline-block;
      padding: 2px 9px;
      margin: 0 1px;
      border-radius: 999px;
      background: #e8eef8;
      border: 1px solid #d1dbe9;
      color: #2f4a70;
      font-weight: 600;
      white-space: nowrap;
    }
    .context-line:not(.task-line--fixed) .context-chip {
      background: #3f5f8d;
      border-color: #34547f;
      color: #ffffff;
    }
    .task-line--fixed .context-chip {
      background: var(--chip-bg);
      border-color: var(--chip-border);
      color: var(--chip-text);
    }
    .task-line--fixed .context-chip::after {
      content: " 🔒";
      font-size: 0.82em;
      opacity: 0.85;
      margin-left: 2px;
      vertical-align: baseline;
    }
    .task-card.task-refresh .context-line:not(.task-line--fixed) .context-chip {
      animation: none;
    }
    .task-card.task-refresh #learnTaskCategory.learn-category-dynamic {
      animation: none;
    }
    .category-card {
      width: 100%;
      max-width: 760px;
      box-sizing: border-box;
      margin: 38px auto 0;
      border: 1px solid #d8e0ec;
      border-radius: 14px;
      background: #fcfdff;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.04);
      padding: 14px 16px;
      text-align: center;
    }
    .play-middle-card {
      width: 100%;
      max-width: 760px;
      box-sizing: border-box;
      margin: 21px auto 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      padding: 14px 16px 10px;
      text-align: center;
    }
    .play-context-wrap {
      min-height: 0;
    }
    .play-middle-line {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      column-gap: 6px;
      width: 100%;
    }
    .play-middle-prefix {
      grid-column: 1;
      justify-self: start;
      text-align: left;
      color: #46556b;
      font-size: 1rem;
      line-height: 1.45;
      font-weight: 450;
      white-space: nowrap;
    }
    .play-middle-line #cards {
      grid-column: 2;
      justify-self: center;
      margin: 6px 0 0;
    }
    .play-gap-reserve {
      display: flex;
      justify-content: center;
      margin-top: 7px;
    }
    .task-zone {
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      margin: 18px auto 0;
      padding-top: 18px;
      border-top: 1px solid #d5d5d5;
      background: #fcfcfc;
      border-radius: 10px;
    }
    #playTaskZone {
      border: 1px solid #d5d5d5;
      padding: calc(var(--play-zone-gap) - 1px) 14px var(--play-zone-gap);
      display: flex;
      flex-direction: column;
    }
    #playTaskZone.play-answered #playDecisionPrompt,
    #playTaskZone.play-answered #actions {
      display: none;
    }
    #playTaskZone.play-answered #result {
      margin-top: 0;
      margin-bottom: 10px;
    }
    #learnTaskZone {
      border: 1px solid #d5d5d5;
      padding: 18px 14px 22px;
      overflow-x: hidden;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }
    #learnTaskZone .learn-answer-wrap {
      order: 2;
      margin-top: 0;
      min-height: 0;
      padding: 2px 0;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #learnTaskZone .action-row {
      order: 3;
      margin-top: 0;
    }
    #learnTaskCard {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }
    #learnTaskCard .action-row {
      margin-top: 2px;
    }
    #learnTaskLines {
      min-height: 0;
      padding-top: 18px;
    }
    .learn-category-line {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 0;
      margin-top: 13px;
    }
    #learnTaskCategory {
      position: static;
      width: auto;
      margin: 0;
      text-align: center;
      pointer-events: auto;
      display: inline-block;
      padding: 2px 9px;
      border-radius: 999px;
      border: 1px solid #d1dbe9;
      background: var(--chip-bg);
      color: var(--chip-text);
      font-size: 1rem;
      line-height: 1.35;
      font-weight: 600;
      white-space: nowrap;
    }
    #learnTaskCategory.learn-category-dynamic {
      border-color: #34547f;
      background: #3f5f8d;
      color: #ffffff;
    }
    #learnTaskCategory:not(.learn-category-dynamic)::after {
      content: " 🔒";
      font-size: 0.82em;
      opacity: 0.85;
      margin-left: 2px;
      vertical-align: baseline;
    }
    #learnTaskCategory.learn-category-visual {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 0;
      border: 0;
      background: transparent;
      border-radius: 0;
      color: #16345e;
      white-space: normal;
      line-height: 0;
    }
    #learnTaskCategory.learn-category-visual::after {
      content: none;
    }
    .learn-cat-cards {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .learn-category-line .learn-cat-cards {
      margin: 28px 0 22px;
    }
    .learn-cat-card {
      width: 96px;
      height: 136px;
      border: 2px solid #2a2a2a;
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.14);
      box-sizing: border-box;
      user-select: none;
      position: relative;
      overflow: hidden;
    }
    .learn-cat-card.red { color: #c22828; }
    .learn-cat-card.black { color: #111; }
    .learn-cat-corner {
      position: absolute;
      left: 4px;
      top: 3px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      width: 0.9rem;
      line-height: 1;
      z-index: 2;
    }
    .learn-cat-corner-bottom {
      left: auto !important;
      top: auto !important;
      right: 4px !important;
      bottom: 2px !important;
      transform: rotate(180deg);
      transform-origin: center;
    }
    .learn-cat-rank { font-size: 1.58rem; font-weight: 400; line-height: 1; font-family: Arial, sans-serif; display: block; text-align: center; }
    .learn-cat-suit { font-size: 1.05rem; line-height: 1; margin-top: -2px; display: block; text-align: center; }
    .learn-cat-suit-big { position: absolute; left: 50%; top: calc(50% - 2px); transform: translate(-50%, -50%); font-size: 2.6rem; line-height: 1; z-index: 1; }
    .learn-cat-label {
      display: block;
      text-align: center;
      font-size: 0.84rem;
      color: #46556b;
      font-weight: 600;
      line-height: 1.2;
    }
    .learn-cat-gap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 4px;
      padding: 0;
      min-height: 21px;
      color: #3f4e61;
      font-size: 0.78rem;
      font-weight: 400;
      line-height: 1.2;
    }
    .learn-cat-gap.is-placeholder {
      visibility: hidden;
    }
    .learn-cat-hint {
      display: block;
      margin-top: 4px;
      font-size: 0.74rem;
      color: #5a677a;
      line-height: 1.2;
    }
    #learnCategoryLead {
      display: none;
    }
    #learnPrompt {
      display: block;
      margin: 0;
      width: 100%;
    }
    #learnLineAction {
      display: none;
    }
    .task-line {
      margin-top: 4px;
      color: #3f4e61;
      font-size: 0.95rem;
      line-height: 1.35;
    }
    .task-line--fixed {
      filter: none;
      font-weight: inherit;
    }
    .task-question {
      text-align: center;
      margin-top: 2px;
      margin-bottom: 8px;
      color: #4f6278;
      font-weight: 600;
      letter-spacing: 0.01em;
      font-size: 0.95rem;
    }
    #playScenarioLines {
      margin-bottom: 14px;
    }
    #playDecisionPrompt {
      margin-top: calc(var(--play-zone-gap) - 10px);
      margin-bottom: var(--play-zone-gap);
    }
    #playTaskZone #actions {
      margin-top: 0;
      margin-bottom: var(--play-zone-gap);
    }
    #playTaskZone .action-row {
      margin-top: 0;
    }
    #playTaskZone.play-answered .action-row {
      margin-top: 0;
    }
    .action-row {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 10px;
    }
    .learn-review-actions {
      display: grid;
      grid-template-columns: minmax(108px, 1fr) auto minmax(140px, 1fr);
      grid-template-areas: "nok ok skip";
      gap: 8px;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: var(--learn-action-width);
      margin: 0 auto;
    }
    .learn-review-actions button {
      min-width: 0;
      width: 100%;
      height: 46px;
      min-height: 46px;
      max-height: 46px;
      box-sizing: border-box;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    #learnNokBtn {
      grid-area: nok;
    }
    #learnOkBtn,
    #learnToggleBtn {
      width: 240px;
      height: 46px !important;
      min-height: 46px !important;
      max-height: 46px !important;
      padding-top: 0;
      padding-bottom: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      justify-self: center;
      box-sizing: border-box;
    }
    #learnOkBtn {
      grid-area: ok;
      justify-self: center;
    }
    #learnSkipBtn {
      grid-area: skip;
      font-size: 0.82rem;
      line-height: 1.15;
    }
    .primary-btn {
      border: 1px solid var(--primary-bg);
      border-radius: 8px;
      background: var(--primary-bg);
      color: var(--primary-text);
      min-height: 42px;
      min-width: 150px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
    }
    .primary-btn:hover { background: var(--primary-bg-hover); }
    .primary-btn:active { transform: translateY(1px); }
    .primary-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      transform: none;
    }
    @keyframes taskRefresh {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes contextChipPop {
      0% { transform: scale(0.94); }
      65% { transform: scale(1.06); }
      100% { transform: scale(1); }
    }
    .row { margin: 14px 0; }
    select, button {
      font-size: 0.95rem;
      padding: 8px 10px;
    }
    select {
      width: 100%;
      border: 1px solid #cfcfcf;
      border-radius: 8px;
      background: #fff;
      min-height: 42px;
    }
    .config {
      border: 1px solid #dddddd;
      border-radius: 12px;
      background: #fff;
      padding: 14px;
      position: sticky;
      top: 12px;
    }
    .config-controls > * + * { margin-top: 10px; }

    .config-toggle {
      display: none;
      width: 100%;
      border: 1px solid #cfcfcf;
      border-radius: 8px;
      background: #f7f7f7;
      color: #2f3741;
      min-height: 40px;
      font-size: 0.93rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
    }
    .subtle-btn {
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      background: #f4f4f4;
      color: #444;
      min-height: 42px;
      cursor: pointer;
    }
    .subtle-btn:hover { background: #ececec; }
    .subtle-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }
    .cards {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 0;
    }
    .cards.played .card {
      opacity: 0.55;
      filter: grayscale(80%);
    }
    .cards.played .hand-tag {
      opacity: 0.55;
    }
    .card {
      width: 96px;
      height: 136px;
      border: 2px solid #222;
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
      box-sizing: border-box;
      user-select: none;
      position: relative;
      overflow: hidden;
    }
    .card-corner {
      position: absolute;
      left: 4px;
      top: 3px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      width: auto;
      line-height: 1;
      z-index: 2;
    }
    .card-corner-bottom {
      left: auto !important;
      top: auto !important;
      right: 4px !important;
      bottom: 2px !important;
      transform: rotate(180deg);
      transform-origin: center;
    }
    .card-rank {
      font-size: 1.58rem;
      font-weight: 400;
      line-height: 1;
      font-family: Arial, sans-serif;
      display: inline-block;
      transform: scaleX(0.8);
      transform-origin: center;
    }
    .card-rank-ten {
      letter-spacing: -0.08em;
    }
    .card-suit {
      font-size: 1.05rem;
      line-height: 1;
      margin-top: -3px;
      display: block;
      text-align: center;
    }
    .card-suit-big {
      position: absolute;
      left: 50%;
      top: calc(50% - 2px);
      transform: translate(-50%, -50%);
      font-size: 2.6rem;
      line-height: 1;
      z-index: 1;
    }
    .card.red { color: #c22828; }
    .card.black { color: #111; }
    .card.reveal {
      animation: revealBorder 0.5s ease;
    }
    @keyframes revealBorder {
      0% {
        border-color: #000;
        border-width: 4px;
        box-shadow: 0 0 0 2px #000;
      }
      100% {
        border-color: #222;
        border-width: 2px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
      }
    }
    .hand-tag {
      flex: 0 0 100%;
      order: 99;
      text-align: center;
      margin-top: 6px;
      font-weight: bold;
      font-size: 1rem;
      color: #444;
      margin-left: 0;
    }
    .scenario {
      margin: 0;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
    }
    .stats {
      border: 2px solid #d8d8d8;
      border-radius: 8px;
      background: #f7f7f7;
      padding: 12px 14px;
      font-size: 0.95rem;
      margin-top: 24px;
    }
    .learn-card {
      border: 1px solid #d5d5d5;
      border-radius: 14px;

    function idx(r) { return RANKS.indexOf(r); }

    function canonicalHand(c1, c2) {
      const r1 = c1[0], s1 = c1[1], r2 = c2[0], s2 = c2[1];
      if (r1 === r2) return r1 + r2;
      const i1 = idx(r1), i2 = idx(r2);
      const high = i1 < i2 ? r1 : r2;
      const low = i1 < i2 ? r2 : r1;
      const suited = s1 === s2 ? "s" : "o";
      return high + low + suited;

    function dealTwoCards() {
      const deck = [];
      for (const r of RANKS) {
        for (const s of SUITS) deck.push(r + s);

      const a = Math.floor(Math.random() * deck.length);
      const c1 = deck.splice(a, 1)[0];

      return [c1, c2];

    function matchToken(token, hand) {
      token = token.replace(/\([^)]*\)/g, "").trim();
      if (!token || token === "-") return false;
      if (token === "ALL_0G_S") {
        if (hand.length !== 3 || hand[2] !== "s") return false;
        return (idx(hand[1]) - idx(hand[0]) - 1) === 0;
      }
      if (token === "ALL_0G_O") {
        if (hand.length !== 3 || hand[2] !== "o") return false;
        return (idx(hand[1]) - idx(hand[0]) - 1) === 0;
      }
      if (token === "ALL_1G_S") {
        if (hand.length !== 3 || hand[2] !== "s") return false;
        return (idx(hand[1]) - idx(hand[0]) - 1) === 1;
      }
      if (token === "ALL_2G_S") {
        if (hand.length !== 3 || hand[2] !== "s") return false;
        return (idx(hand[1]) - idx(hand[0]) - 1) === 2;
      }

      if (token.includes("-")) {
        const [start, end] = token.split("-").map(t => t.trim());
        if (start.length === 2 && end.length === 2 && start[0] === start[1] && end[0] === end[1]) {
          if (hand.length !== 2 || hand[0] !== hand[1]) return false;
          const h = idx(hand[0]);
          return h >= idx(start[0]) && h <= idx(end[0]);
        }

        if (start.length !== 3 || end.length !== 3) return false;
        if (hand.length !== 3) return false;
        if (start[2] !== end[2] || hand[2] !== start[2]) return false;

        const s1 = idx(start[0]), s2 = idx(start[1]);
        const e1 = idx(end[0]), e2 = idx(end[1]);
        const d1 = Math.sign(e1 - s1);
        const d2 = Math.sign(e2 - s2);

        let i1 = s1, i2 = s2;
        for (let n = 0; n < 20; n++) {
          if (hand[0] === RANKS[i1] && hand[1] === RANKS[i2]) return true;
          if (i1 === e1 && i2 === e2) break;
          if (d1 !== 0) i1 += d1;
          if (d2 !== 0) i2 += d2;
        }
        return false;
      }

      if (token.endsWith("+")) {
        const base = token.slice(0, -1);
        if (base.length === 2 && base[0] === base[1]) {
          if (hand.length !== 2 || hand[0] !== hand[1]) return false;
          return idx(hand[0]) <= idx(base[0]);
        }
        if (base.length !== 3 || hand.length !== 3) return false;
        if (hand[0] !== base[0] || hand[2] !== base[2]) return false;
        return idx(hand[1]) <= idx(base[1]);
      }

      return token === hand;
    }

    function inRange(tokens, hand) {
      for (const token of tokens) {
        if (matchToken(token, hand)) return true;
      }
      return false;
    }

    function isSBOpen(hand) {
      if (hand.length === 2) return true;
      const hi = hand[0];
      const suited = hand[2] === "s";

      if (suited && ["A", "K", "Q", "J"].includes(hi)) return true;
      if (!suited && ["A", "K", "Q", "J"].includes(hi)) return true;

      if (suited) {
        const gap = idx(hand[1]) - idx(hand[0]) - 1;
        if (gap === 0 || gap === 1 || gap === 2) return true;
      }

      return false;
    }

    function resolveCorrectAction(hand, heroPos, scenario, raiserPos, specialCondition) {
      if (scenario === "NO_RAISE") {
        const isBlind = isBlindPosition(heroPos);
        const raiseRefPos = isBlind ? "BLIND" : heroPos;
        const raise = inRange(OPEN_INIT_RAISE[raiseRefPos], hand);
        if (raise) {

            correct: "RAISE",
            tableLabel: "Tabelle 1: Pre-Flop Initiative",
            reason: hand + " ist in der Raise-Range (" + joinRanges(OPEN_INIT_RAISE[raiseRefPos]) + ")."
          };

        // Dokumentation: Die Tabellen bleiben mit einer gemeinsamen Blinds-Spalte gepflegt.
        // Im Hands-Tab wird SB/BB zusaetzlich logisch abgeleitet:
        // Aenderungen an dieser Ableitungsregel nur nach expliziter Ruecksprache/Freigabe vornehmen:
        // - In Blinds-Call-Spalte: SB=Call, BB=Check
        // - In keiner Blinds-Spalte: SB=Fold, BB=Check
        if (isBlind) {
          const inBlindCall = isBlindCallCheck(hand);
          if (inBlindCall) {
            return {
              correct: heroPos === "BB" ? "CHECK" : "CALL",
              tableLabel: "Tabelle 1: Pre-Flop Initiative",
              reason: hand + " ist in der Call-Range der Blinds."
            };
          }

          if (heroPos === "BB") {
            return {
              correct: "CHECK",
              tableLabel: "Tabelle 1: Pre-Flop Initiative",
              reason: hand + " ist weder in der Raise-Range (" + joinRanges(OPEN_INIT_RAISE.BLIND) + ") noch in der Call-Range der Blinds, daher Check im Big Blind."
            };
          }

          return {
            correct: "FOLD",
            tableLabel: "Tabelle 1: Pre-Flop Initiative",
            reason: hand + " ist weder in der Raise-Range (" + joinRanges(OPEN_INIT_RAISE.BLIND) + ") noch in der Call-Range der Blinds."
          };
        }

        return {
          correct: "FOLD",
          tableLabel: "Tabelle 1: Pre-Flop Initiative",
          reason: hand + " ist nicht in der Raise-Range (" + joinRanges(OPEN_INIT_RAISE[raiseRefPos]) + ")."
        };
      }

      let col;
      if (isBlindPosition(heroPos)) {
        if (specialCondition === "EP_STEAL" || specialCondition === "RAISE_GT_3BB") {
          col = "EP";
        } else if (specialCondition === "DEALER_CO_STEAL") {
          col = "BLINDS";

      const table = scenario === "TIGHT_RAISE" ? FACING_TIGHT : FACING_LOOSE;

      const tableLabel = scenario === "TIGHT_RAISE"

      if (inRange(cfg.threeBet, hand)) {
        return {
          correct: "3BET",
          tableLabel,
          reason: hand + " ist in der 3-Bet-Range (" + joinRanges(cfg.threeBet) + ")."

          correct: "CALL",
          tableLabel,
          reason: hand + " ist in der Call-Range (" + joinRanges(cfg.call) + ")."
        };
      }
      return {
        correct: "FOLD",
        tableLabel,
        reason: hand + " ist weder in der Call-Range (" + joinRanges(cfg.call) + ") noch in der 3-Bet-Range (" + joinRanges(cfg.threeBet) + ")."
      };
    }

        "looser Spieler",
        "geraised",
        "gecallt",
        "gefoldet",
        "Steal",
        "Dealer",
        "3 Big Blinds"
      ];
      highlights.sort((a, b) => b.length - a.length);

      const placeholders = [];
      for (let i = 0; i < highlights.length; i += 1) {
        const token = highlights[i];
        const ph = "__CTX_CHIP_" + i + "__";
        placeholders.push({ ph, html: '<span class="context-chip">' + token + '</span>' });
        const re = new RegExp(escapeRegex(token), "g");
        out = out.replace(re, ph);
      }

      for (const item of placeholders) {
        const re = new RegExp(escapeRegex(item.ph), "g");
        out = out.replace(re, item.html);
      }

      return out;
    }

    function mergeContextChips(html) {
      return String(html).replace(/(?:\s*<span class="context-chip">[\s\S]*?<\/span>\s*)+/g, (group) => {
        const plain = group.replace(/<[^>]+>/g, " ").replace(/\s+/g, " ").trim();
        return plain ? '<span class="context-chip context-chip-group">' + plain + '</span>' : group;
      });
    }

    function formatContextLine(text) {
      const cleaned = String(text || "").replace(/\.\s*$/, "").trim();
      const html = formatContextText(cleaned);
      const marker = '<span class="context-chip">';
      const firstChip = html.indexOf(marker);
      if (firstChip < 0) {
        return '<span class="context-prefix-only">' + html + '</span>';
      }
      const prefix = html.slice(0, firstChip).trimEnd();
      const rest = mergeContextChips(html.slice(firstChip));
      return (prefix ? '<span class="context-prefix">' + prefix + '</span>' : '') +
        '<span class="context-main">' + rest + '</span>';
    }

    function suitInfo(s) {
      if (s === "h") return { symbol: "♥", cls: "red" };
      if (s === "d") return { symbol: "♦", cls: "red" };
      if (s === "s") return { symbol: "♠", cls: "black" };
      return { symbol: "♣", cls: "black" };
    }


    function randomSuit() {
      return SUITS[Math.floor(Math.random() * SUITS.length)];
    }

    function randomDifferentSuit(base) {
      const options = SUITS.filter((s) => s !== base);
      return options[Math.floor(Math.random() * options.length)];
    }

    function categoryPreviewCards(category) {
      if (category === "Paare") {
        return {
          cards: [
            { rank: "X", suit: randomSuit() },
            { rank: "X", suit: randomSuit() }
          ],
          gap: null
        };
      }

      const broadway = String(category).match(/^(Ass|Koenig|Dame|Bube) \((Suited|Offsuit)\)$/);
      if (broadway) {
        const rankMap = { Ass: "A", Koenig: "K", Dame: "Q", Bube: "J" };
        const firstRank = rankMap[broadway[1]] || "X";
        const suited = broadway[2] === "Suited";
        const suit1 = randomSuit();
        const suit2 = suited ? suit1 : randomDifferentSuit(suit1);
        return {
          cards: [
            { rank: firstRank, suit: suit1 },
            { rank: "?", suit: suit2 }
          ],
          gap: null
        };
      }

      const gapped = String(category).match(/^(Connectors|1-Gappers|2-Gappers) \((Suited|Offsuit)\)$/);
      if (gapped) {
        const suited = gapped[2] === "Suited";
        const suit1 = randomSuit();
        const suit2 = suited ? suit1 : randomDifferentSuit(suit1);
        const gapMap = { "Connectors": 0, "1-Gappers": 1, "2-Gappers": 2 };
        return {
          cards: [
            { rank: "?", suit: suit1 },
            { rank: "?", suit: suit2 }
          ],
          gap: gapMap[gapped[1]],
          rangeHint: "Werte: J bis 2"
        };
      }

      return null;
    }

    function handMatchesCategory(hand, category) {
      if (category === "ALL") return true;
      if (hand.length === 2) return category === "Paare";
      const high = hand[0];
      const low = hand[1];
      const suited = hand[2];
      const gap = idx(low) - idx(high) - 1;

      if (category === "Ass (Suited)") return high === "A" && suited === "s";
      if (category === "Ass (Offsuit)") return high === "A" && suited === "o";
      if (category === "Koenig (Suited)") return high === "K" && suited === "s";
      if (category === "Koenig (Offsuit)") return high === "K" && suited === "o";
      if (category === "Dame (Suited)") return high === "Q" && suited === "s";
      if (category === "Dame (Offsuit)") return high === "Q" && suited === "o";
      if (category === "Bube (Suited)") return high === "J" && suited === "s";
      if (category === "Bube (Offsuit)") return high === "J" && suited === "o";
      if (category === "Connectors (Suited)") return suited === "s" && gap === 0;
      if (category === "Connectors (Offsuit)") return suited === "o" && gap === 0;
      if (category === "1-Gappers (Suited)" || category === "1-Gappers") return suited === "s" && gap === 1;
      if (category === "1-Gappers (Offsuit)") return suited === "o" && gap === 1;
      if (category === "2-Gappers (Suited)" || category === "2-Gappers") return suited === "s" && gap === 2;
      return true;
    }

    function syncTaskCardHeights() {
      const root = document.documentElement;
      const play = document.getElementById("playTaskCard");
      const learn = document.getElementById("learnTaskCard");
      if (!play || !learn) return;
      if (window.matchMedia("(max-width: 768px)").matches) {
        root.style.removeProperty("--task-card-fixed-height");
        syncedTaskCardHeight = 0;
        return;
      }
      root.style.removeProperty("--task-card-fixed-height");
      const measured = Math.max(
        Math.ceil(play.getBoundingClientRect().height),
        Math.ceil(learn.getBoundingClientRect().height)
      );
      const h = Math.max(measured, syncedTaskCardHeight);
      syncedTaskCardHeight = h;
      if (h > 0) root.style.setProperty("--task-card-fixed-height", h + "px");
    }

    function syncTopContextHeights() {
      const playTop = document.querySelector("#playTaskCard .play-context-wrap");
      const learnTop = document.getElementById("learnTaskLines");
      if (!playTop || !learnTop) return;
      if (window.matchMedia("(max-width: 768px)").matches) {
        playTop.style.minHeight = "";
        learnTop.style.minHeight = "";
        syncedTopContextHeight = 0;
        return;
      }

      playTop.style.minHeight = "";
      learnTop.style.minHeight = "";

      const playH = Math.ceil(playTop.getBoundingClientRect().height);
      const learnH = Math.ceil(learnTop.getBoundingClientRect().height);
      const target = Math.max(playH, learnH, syncedTopContextHeight);
      syncedTopContextHeight = target;
      if (target > 0) {
        playTop.style.minHeight = target + "px";
        learnTop.style.minHeight = target + "px";
      }
    }

    function syncBottomZoneHeights() {
      const playZone = document.getElementById("playTaskZone");
      const learnZone = document.getElementById("learnTaskZone");
      if (!playZone || !learnZone) return;
      if (window.matchMedia("(max-width: 768px)").matches) {
        playZone.style.minHeight = "";
        learnZone.style.minHeight = "";
        syncedBottomZoneHeight = 0;
        return;
      }

      playZone.style.minHeight = "";
      learnZone.style.minHeight = "";

      const playH = Math.ceil(playZone.getBoundingClientRect().height);
      const learnH = Math.ceil(learnZone.getBoundingClientRect().height);
      const target = Math.max(playH, learnH, syncedBottomZoneHeight);
      syncedBottomZoneHeight = target;
      if (target > 0) {
        playZone.style.minHeight = target + "px";
        learnZone.style.minHeight = target + "px";
      }
    }

    function learnComboSignature(q) {
      return [q.areaKey, q.positionKey, q.actionSetKey, q.category].join("|");
    }

    function setLearnActionState(mode) {
      const showBtn = document.getElementById("learnToggleBtn");
      const review = document.getElementById("learnReviewActions");
      const zone = document.getElementById("learnTaskZone");
      const prompt = document.getElementById("learnPrompt");
      if (mode === "review") {
        showBtn.style.display = "none";
        review.style.display = "grid";
        prompt.style.display = "none";
        zone.classList.add("learn-answered");
      } else {
        showBtn.style.display = "inline-block";
        review.style.display = "none";
        prompt.style.display = "block";
        zone.classList.remove("learn-answered");
      }
    }

    function syncLearnAnswerSlotHeight() {
      const wrap = document.querySelector("#learnTaskZone .learn-answer-wrap");
      const result = document.getElementById("learnResult");
      if (!wrap || !result) return;

      const parts = (learnCurrent && Array.isArray(learnCurrent.answerParts)) ? learnCurrent.answerParts : [];
      const probe = document.createElement("div");
      probe.style.position = "absolute";
      probe.style.visibility = "hidden";
      probe.style.pointerEvents = "none";
      probe.style.left = "0";
      probe.style.top = "0";
      probe.style.width = Math.max(240, wrap.clientWidth - 20) + "px";
      probe.style.margin = "0";
      probe.style.padding = "0";
      probe.style.border = "0";
      probe.style.background = "transparent";

      if (parts.length > 0) {
        const cols = parts.length;
        const head = parts.map((part) => {
          const label = escapeAttrHtml(part.label || "");
          return "<div class=\"learn-answer-head-cell\">" + label + "</div>";
        }).join("");
        const values = parts.map((part) => {
          const value = escapeAttrHtml(displayLearnCellValue(part.value));
          return "<div class=\"learn-answer-value-cell\">" + value + "</div>";
        }).join("");

        probe.innerHTML =
          "<div class=\"learn-answer-table\">" +
            "<div class=\"learn-answer-head\" style=\"grid-template-columns: repeat(" + cols + ", minmax(0, 1fr));\">" + head + "</div>" +
            "<div class=\"learn-answer-values\" style=\"grid-template-columns: repeat(" + cols + ", minmax(0, 1fr));\">" + values + "</div>" +
          "</div>";
      } else {
        probe.textContent = learnCurrent ? normalizeLearnAnswer(learnCurrent.answer) : "-";
      }

      wrap.appendChild(probe);
      const style = window.getComputedStyle(probe);
      const mt = parseFloat(style.marginTop) || 0;
      const mb = parseFloat(style.marginBottom) || 0;
      const h = Math.ceil(probe.offsetHeight + mt + mb + 2);
      wrap.removeChild(probe);

      wrap.style.height = "";
      wrap.style.minHeight = h + "px";
    }

    function resetLearnReviewQueue() {
      learnReviewQueue = [];
      learnSinceLastReview = 0;
      learnPositionSeqIndex = 0;
    }

    function pickLearnQuestion(pool) {
      const bySig = new Map(pool.map((q) => [learnComboSignature(q), q]));
      learnReviewQueue = learnReviewQueue.filter((sig) => bySig.has(sig));

      if (learnReviewQueue.length > 0 && learnSinceLastReview >= 2) {
        const sig = learnReviewQueue[0];
        const q = bySig.get(sig);
        if (q) {
          learnSinceLastReview = 0;
          return { question: q, isReview: true };
        }
      }

      const categoryCfg = document.getElementById("learnCfgCategory").value || "ALL";
      const positionCfg = document.getElementById("learnCfgPosition").value || "ALL";
      const posMode = document.getElementById("learnCfgPosMode").value || "RANDOM";
      let q = null;

      if (categoryCfg !== "ALL" && positionCfg === "ALL" && posMode === "SEQUENTIAL") {
        for (let offset = 0; offset < POSITION_ORDER.length; offset += 1) {
          const pos = POSITION_ORDER[(learnPositionSeqIndex + offset) % POSITION_ORDER.length];
          const candidates = pool.filter((item) => item.positionKey === pos);
          if (candidates.length) {
            q = candidates[Math.floor(Math.random() * candidates.length)];
            learnPositionSeqIndex = (POSITION_ORDER.indexOf(pos) + 1) % POSITION_ORDER.length;
            break;
          }
        }
      }

      if (!q) {
        q = pool[Math.floor(Math.random() * pool.length)];
      }

      if (learnReviewQueue.length > 0) {
        learnSinceLastReview += 1;
      } else {
        learnSinceLastReview = 0;
      }
      return { question: q, isReview: false };
    }


    function nextLearnQuestion() {
      applyLearnAreaModeUI();
      renderLearnFixedChips();
      const pool = filteredLearnQuestions();
      const res = document.getElementById("learnResult");

      if (!pool.length) {
        learnCurrent = null;
        const categoryEl = document.getElementById("learnTaskCategory");
        const categoryCfg = document.getElementById("learnCfgCategory").value || "ALL";
        renderLearnCategory(categoryEl, "-", categoryCfg === "ALL");
        document.getElementById("learnPrompt").textContent = "Welche Haende spielst du?";
        const lineArea = document.getElementById("learnLineArea");
        const linePos = document.getElementById("learnLinePosition");
        const lineAction = document.getElementById("learnLineAction");
        setTaskLineValue(lineArea, "-", false);
        setTaskLineValue(linePos, "-", false);
        setTaskLineValue(lineAction, "-", false);
        lineAction.style.display = "none";
        res.style.display = "block";
        res.className = "result neutral";
        res.textContent = "Keine Frage fuer diese Filter-Kombination vorhanden.";
        const btn = document.getElementById("learnToggleBtn");
        btn.textContent = "Antwort anzeigen";
        btn.disabled = true;
        setLearnActionState("show");
        document.getElementById("learnPrompt").style.display = "none";
        syncLearnAnswerSlotHeight();
        syncTopContextHeights();
        syncBottomZoneHeights();
        syncTaskCardHeights();
        return;
      }

      const picked = pickLearnQuestion(pool);
      const q = picked.question;
      learnCurrent = { ...q, isReview: picked.isReview };
      learnAnswerVisible = false;

      const lineArea = document.getElementById("learnLineArea");
      const linePos = document.getElementById("learnLinePosition");
      const lineAction = document.getElementById("learnLineAction");
      const areaCfg = document.getElementById("learnCfgArea").value;
      const posCfg = document.getElementById("learnCfgPosition").value;

      setTaskLineValue(linePos, learnPositionScenarioLine(q.positionKey), posCfg !== "ALL");
      setTaskLineValue(lineArea, learnAreaScenarioLine(q.areaKey), areaCfg !== "ALL");
      setTaskLineValue(lineAction, "-", false);
      lineAction.style.display = "none";

      const categoryCfg = document.getElementById("learnCfgCategory").value || "ALL";
      const categoryEl = document.getElementById("learnTaskCategory");
      renderLearnCategory(categoryEl, q.category, categoryCfg === "ALL");
      document.getElementById("learnPrompt").textContent = q.prompt;
      animateTaskCard("learnTaskCard");

      const btn = document.getElementById("learnToggleBtn");
      btn.textContent = "Antwort anzeigen";
      btn.disabled = false;
      setLearnActionState("show");
      res.style.display = "none";
      syncLearnAnswerSlotHeight();
      syncTopContextHeights();
      syncBottomZoneHeights();
      syncTaskCardHeights();
    }
    function normalizeLearnAnswer(answer) {
      let text = String(answer || "-").replace(/\r\n/g, "\n");
      text = text.replace(/\s*\|\s*/g, "\n");
      text = text.replace(/\n{3,}/g, "\n\n");
      text = text.replace(/\n+$/g, "");
      return text || "-";
    }


    function escapeAttrHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function renderLearnAnswer(res, current) {
      const parts = Array.isArray(current.answerParts) ? current.answerParts : [];
      if (parts.length > 0) {
        const cols = parts.length;
        const head = parts.map((part) => {
          const label = escapeAttrHtml(part.label || "");
          return "<div class=\"learn-answer-head-cell\">" + label + "</div>";
        }).join("");
        const values = parts.map((part) => {
          const value = escapeAttrHtml(displayLearnCellValue(part.value));
          return "<div class=\"learn-answer-value-cell\">" + value + "</div>";
        }).join("");

        res.innerHTML =
          "<div class=\"learn-answer-table\">" +
            "<div class=\"learn-answer-head\" style=\"grid-template-columns: repeat(" + cols + ", minmax(0, 1fr));\">" + head + "</div>" +
            "<div class=\"learn-answer-values\" style=\"grid-template-columns: repeat(" + cols + ", minmax(0, 1fr));\">" + values + "</div>" +
          "</div>";
      } else {
        res.textContent = normalizeLearnAnswer(current.answer);
      }
    }

    function toggleLearnAnswer() {
      if (!learnCurrent || learnAnswerVisible) return;
      const res = document.getElementById("learnResult");
      res.style.display = "block";
      res.className = "result neutral";
      renderLearnAnswer(res, learnCurrent);
      learnAnswerVisible = true;
      setLearnActionState("review");
      syncLearnAnswerSlotHeight();
      syncBottomZoneHeights();
      syncTaskCardHeights();
    }

    function learnReviewAnswer(ok) {
      if (!learnCurrent || !learnAnswerVisible) return;
      const sig = learnComboSignature(learnCurrent);
      const inQueue = learnReviewQueue.includes(sig);

      if (ok) {
        if (learnCurrent.isReview) {
          learnReviewQueue = learnReviewQueue.filter((x) => x !== sig);
        }
      } else {
        if (!inQueue) {
          learnReviewQueue.push(sig);
        }
      }

      nextLearnQuestion();
    }

    function learnSkipCombination() {
      if (!learnCurrent || !learnAnswerVisible) return;
      const sig = learnComboSignature(learnCurrent);
      learnExcludedSignatures.add(sig);
      learnReviewQueue = learnReviewQueue.filter((x) => x !== sig);
      nextLearnQuestion();
    }

    function renderActions(scenario, heroPos) {
      const actions = document.getElementById("actions");
      actions.innerHTML = "";

      let options;
      if (scenario === "NO_RAISE") {
        if (heroPos === "BB") {
          options = [{ id: "RAISE", text: "Raise" }, { id: "CHECK", text: "Check" }];
        } else if (heroPos === "SB") {
          options = [{ id: "RAISE", text: "Raise" }, { id: "CALL", text: "Call" }, { id: "FOLD", text: "Fold" }];
        } else {
          options = [{ id: "RAISE", text: "Raise" }, { id: "FOLD", text: "Fold" }];
        }
      } else {
        options = [{ id: "CALL", text: "Call" }, { id: "3BET", text: "3-Bet" }, { id: "FOLD", text: "Fold" }];
      }

      for (const opt of options) {
        const b = document.createElement("button");
        b.textContent = opt.text;
        b.onclick = () => answer(opt.id);
        actions.appendChild(b);
      }
    }

    function syncPlayResultReservedHeight() {
      const prompt = document.getElementById("playDecisionPrompt");
      const actions = document.getElementById("actions");
      const result = document.getElementById("result");
      if (!prompt || !actions || !result) return;
      const resultButtonGap = 10;

      const blockHeightWithMargins = (el) => {
        const style = window.getComputedStyle(el);
        const mt = parseFloat(style.marginTop) || 0;
        const mb = parseFloat(style.marginBottom) || 0;
        return el.offsetHeight + mt + mb;
      };

      const reserved = Math.ceil(blockHeightWithMargins(prompt) + blockHeightWithMargins(actions));
      const target = Math.max(0, reserved - resultButtonGap);
      result.style.minHeight = target + "px";
      result.style.height = target + "px";
    }

    function answer(choice) {
      if (!current || current.locked) return;
      current.locked = true;
      const res = document.getElementById("result");
      const playZone = document.getElementById("playTaskZone");
      const ok = choice === current.correct;
      document.getElementById("cards").classList.add("played");
      setActionButtonsDisabled(true);
      updateDealButton("ready");
      syncPlayResultReservedHeight();
      playZone.classList.add("play-answered");

      stats.total += 1;
      stats.byPos[current.heroPos].total += 1;
      if (ok) {
        stats.correct += 1;
        stats.byPos[current.heroPos].correct += 1;
      } else {
        stats.wrong += 1;
      }
      renderStats();

      res.style.display = "flex";
      res.className = "result " + (ok ? "ok" : "bad");
      res.textContent = ok
        ? "✔ " + actionLabel(choice) + " ist richtig"
        : "✘ " + actionLabel(choice) + " ist falsch. Korrekt: " + actionLabel(current.correct);
      if (resolveTimer) clearTimeout(resolveTimer);
      updateDealButton("ready");
      syncBottomZoneHeights();
      syncTaskCardHeights();
    }

    function nextHand(highlightNew = false) {
      if (resolveTimer) {
        clearTimeout(resolveTimer);
        resolveTimer = null;
      }
      updateDealButton("ready");
      const selected = document.getElementById("position").value;
      const selectedCondition = document.getElementById("condition").value;
      const selectedCategory = document.getElementById("playCfgCategory").value;
      const playPosMode = document.getElementById("playCfgPosMode").value;
      const selectedSpecial = document.getElementById("specialCondition").value;
      let heroPos = getPosition(selected);
      const scenario = getScenario(selectedCondition);
      if (selected === "ALL" && selectedCategory !== "ALL" && playPosMode === "SEQUENTIAL") {
        heroPos = PLAY_POSITION_ORDER[playPositionSeqIndex % PLAY_POSITION_ORDER.length];
        playPositionSeqIndex = (playPositionSeqIndex + 1) % PLAY_POSITION_ORDER.length;
      }
      if (selected === "ALL" && selectedCondition === "LOOSE_RAISE" && selectedSpecial !== "ALL") {
        heroPos = Math.random() < 0.5 ? "SB" : "BB";
      }
      const specialCondition = (scenario === "LOOSE_RAISE" && isBlindPosition(heroPos)) ? selectedSpecial : "ALL";

      let c1 = null;
      let c2 = null;
      let hand = null;
      let attempts = 0;
      do {
        [c1, c2] = dealTwoCards();
        hand = canonicalHand(c1, c2);
        attempts += 1;
      } while (!handMatchesCategory(hand, selectedCategory) && attempts < 5000);

      let raiserPos = null;
      if (isBlindPosition(heroPos) && scenario !== "NO_RAISE") {
        if (specialCondition === "EP_STEAL" || specialCondition === "RAISE_GT_3BB") {
          raiserPos = "EP";
        } else if (specialCondition === "DEALER_CO_STEAL") {
          raiserPos = Math.random() < 0.5 ? "CO" : "BTN";
        } else {
          const possible = ["EP", "CO", "BTN"];
          raiserPos = possible[Math.floor(Math.random() * possible.length)];
        }
      }

      const resolved = resolveCorrectAction(hand, heroPos, scenario, raiserPos, specialCondition);
      current = {
        hand,
        heroPos,
        scenario,
        raiserPos,
        specialCondition,
        correct: resolved.correct,
        tableLabel: resolved.tableLabel,
        reason: resolved.reason,
        locked: false
      };

      renderPlayScenarioLines(
        {
          heroPos,
          scenario,
          specialCondition,
          raiserPos
        },
        {
          position: selected !== "ALL",
          scenario: selectedCondition !== "ALL",
          special: specialCondition !== "ALL"
        }
      );

      renderCards(c1, c2, hand, false);
      renderPlayFixedChips();
      if (highlightNew) animateTaskCard("playTaskCard");
      document.getElementById("result").style.display = "none";
      document.getElementById("playTaskZone").classList.remove("play-answered");
      renderActions(scenario, heroPos);
      syncPlayResultReservedHeight();
      setActionButtonsDisabled(false);
      syncTopContextHeights();
      syncBottomZoneHeights();
      syncTaskCardHeights();
    }

    document.getElementById("dealBtn").addEventListener("click", () => nextHand(true));
    document.getElementById("tabPlay").addEventListener("click", () => setTab("play"));
    document.getElementById("tabLearn").addEventListener("click", () => setTab("learn"));
    document.getElementById("tabPdf").addEventListener("click", () => setTab("pdf"));
    document.getElementById("learnToggleBtn").addEventListener("click", toggleLearnAnswer);
    document.getElementById("learnOkBtn").addEventListener("click", () => learnReviewAnswer(true));
    document.getElementById("learnNokBtn").addEventListener("click", () => learnReviewAnswer(false));
    document.getElementById("learnSkipBtn").addEventListener("click", learnSkipCombination);
    const onLearnConfigChange = () => {
      resetLearnReviewQueue();
      nextLearnQuestion();
    };
    document.getElementById("learnCfgArea").addEventListener("change", onLearnConfigChange);
    document.getElementById("learnCfgPosition").addEventListener("change", onLearnConfigChange);
    document.getElementById("learnCfgCategory").addEventListener("change", onLearnConfigChange);
    document.getElementById("learnCfgPosMode").addEventListener("change", onLearnConfigChange);
    document.getElementById("condition").addEventListener("change", () => { playPositionSeqIndex = 0; applyPlaySpecialModeUI(); applyPlayCategoryModeUI(); nextHand(true); });
    document.getElementById("position").addEventListener("change", () => { playPositionSeqIndex = 0; applyPlaySpecialModeUI(); applyPlayCategoryModeUI(); nextHand(true); });
    document.getElementById("playCfgCategory").addEventListener("change", () => { playPositionSeqIndex = 0; applyPlayCategoryModeUI(); nextHand(true); });
    document.getElementById("playCfgPosMode").addEventListener("change", () => { playPositionSeqIndex = 0; nextHand(true); });
    document.getElementById("specialCondition").addEventListener("change", () => nextHand(true));

    function setConfigCollapsed(configId, btnId, collapsed) {
      const config = document.getElementById(configId);
      const btn = document.getElementById(btnId);
      if (!config || !btn) return;
      config.classList.toggle("is-collapsed", collapsed);
      btn.textContent = collapsed ? "Konfiguration anzeigen" : "Konfiguration ausblenden";
      btn.setAttribute("aria-expanded", collapsed ? "false" : "true");
    }

    function initMobileConfigToggles() {
      const isMobile = window.matchMedia("(max-width: 768px)").matches;
      setConfigCollapsed("playConfig", "playConfigToggle", isMobile);
      setConfigCollapsed("learnConfig", "learnConfigToggle", isMobile);
    }

    document.getElementById("playConfigToggle").addEventListener("click", () => {
      const c = document.getElementById("playConfig");
      setConfigCollapsed("playConfig", "playConfigToggle", !c.classList.contains("is-collapsed"));
    });
    document.getElementById("learnConfigToggle").addEventListener("click", () => {
      const c = document.getElementById("learnConfig");
      setConfigCollapsed("learnConfig", "learnConfigToggle", !c.classList.contains("is-collapsed"));
    });

    buildLearnQuestions();

    applyPlaySpecialModeUI();
    applyPlayCategoryModeUI();
    initMobileConfigToggles();
    renderStats();
    nextHand();
    nextLearnQuestion();
    window.addEventListener("resize", syncPlayResultReservedHeight);
    window.addEventListener("resize", syncLearnAnswerSlotHeight);
    window.addEventListener("resize", syncTopContextHeights);
    window.addEventListener("resize", syncBottomZoneHeights);

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
