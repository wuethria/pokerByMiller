<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1f1f1f" />
  <title>Poker Preflop Trainer</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1100px;
      margin: 24px auto;
      padding: 0 14px;
      line-height: 1.4;
      color: #171717;
    }
    h1 { font-size: 1.35rem; margin-bottom: 14px; }
    h2 { margin: 0 0 12px; font-size: 1rem; }
    label { font-size: 0.92rem; color: #444; margin-bottom: 6px; display: inline-block; }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 270px;
      gap: 24px;
      align-items: start;
    }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .tab-btn {
      border: 1px solid #cfcfcf;
      border-radius: 999px;
      background: #f3f3f3;
      color: #333;
      padding: 7px 12px;
      cursor: pointer;
    }
    .tab-btn.active {
      background: #1f1f1f;
      color: #fff;
      border-color: #1f1f1f;
    }
    .panel { display: none; }
    .panel.active { display: block; }
    .stage {
      border: 1px solid #d5d5d5;
      border-radius: 14px;
      background: #fcfcfc;
      padding: 16px;
    }
    .stage-meta {
      border: 1px solid #e3e3e3;
      border-radius: 10px;
      background: #fff;
      padding: 10px 12px;
      margin-bottom: 16px;
    }
    .stage-meta-inner {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
    }
    .meta-item + .meta-item { margin-top: 10px; }
    .meta-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #6a6a6a;
      margin-bottom: 2px;
    }
    .row { margin: 14px 0; }
    select, button {
      font-size: 0.95rem;
      padding: 8px 10px;
    }
    select {
      width: 100%;
      border: 1px solid #cfcfcf;
      border-radius: 8px;
      background: #fff;
      min-height: 42px;
    }
    .config {
      border: 1px solid #dddddd;
      border-radius: 12px;
      background: #fff;
      padding: 14px;
      position: sticky;
      top: 12px;
    }
    .config-controls > * + * { margin-top: 10px; }
    .subtle-btn {
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      background: #f4f4f4;
      color: #444;
      min-height: 42px;
      cursor: pointer;
    }
    .subtle-btn:hover { background: #ececec; }
    .subtle-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }
    .cards {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 18px 0;
    }
    .cards.played .card {
      opacity: 0.55;
      filter: grayscale(80%);
    }
    .cards.played .hand-tag {
      opacity: 0.55;
    }
    .card {
      width: 96px;
      height: 136px;
      border: 2px solid #222;
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 8px;
      box-sizing: border-box;
      user-select: none;
    }
    .card-rank {
      font-size: 1.7rem;
      font-weight: 700;
      line-height: 1;
    }
    .card-suit {
      font-size: 1.35rem;
      line-height: 1;
    }
    .card-suit-big {
      text-align: center;
      font-size: 2.6rem;
      line-height: 1;
      margin-top: -6px;
      margin-bottom: -4px;
    }
    .card.red { color: #c22828; }
    .card.black { color: #111; }
    .card.reveal {
      animation: revealBorder 0.5s ease;
    }
    @keyframes revealBorder {
      0% {
        border-color: #000;
        border-width: 4px;
        box-shadow: 0 0 0 2px #000;
      }
      100% {
        border-color: #222;
        border-width: 2px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
      }
    }
    .hand-tag {
      margin-left: 8px;
      font-weight: bold;
      font-size: 1rem;
      color: #444;
    }
    .scenario {
      margin: 0;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
    }
    .stats {
      border: 2px solid #d8d8d8;
      border-radius: 8px;
      background: #f7f7f7;
      padding: 12px 14px;
      font-size: 0.95rem;
      margin-top: 24px;
    }
    .learn-card {
      border: 1px solid #d5d5d5;
      border-radius: 14px;
      background: #fcfcfc;
      padding: 16px;
    }
    .learn-stage {
      border: 1px solid #d5d5d5;
      border-radius: 14px;
      background: #fcfcfc;
      padding: 16px;
    }
    .learn-header {
      border: 1px solid #e3e3e3;
      border-radius: 10px;
      background: #fff;
      padding: 10px 12px;
      margin-bottom: 14px;
    }
    .learn-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #6a6a6a;
      margin-bottom: 2px;
    }
    .learn-prompt-main {
      border: 1px solid #dbdbdb;
      border-radius: 12px;
      background: linear-gradient(180deg, #ffffff 0%, #f8f9fb 100%);
      padding: 14px;
      margin-bottom: 14px;
    }
    .learn-prompt-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
    }
    .learn-prompt-left {
      align-self: start;
    }
    .learn-prompt-right {
      align-self: center;
    }
    .learn-toggle-btn {
      border: 1px solid #cfcfcf;
      border-radius: 8px;
      background: #fff;
      min-height: 42px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.92rem;
      white-space: nowrap;
    }
    .learn-answer-wrap {
      min-height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .learn-line.hidden {
      display: none;
    }
    .learn-value {
      display: inline-block;
      margin-top: 2px;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid transparent;
      font-weight: 600;
    }
    .learn-value.fixed {
      background: #f1ece2;
      border-color: #d5c6a6;
      color: #4f3f1e;
    }
    .learn-value.random {
      background: #e8f0fb;
      border-color: #bad0ee;
      color: #27486b;
    }
    .learn-prompt {
      border: 1px solid #e2e2e2;
      border-radius: 10px;
      background: #fff;
      padding: 12px;
      margin-bottom: 14px;
    }
    .learn-line + .learn-line { margin-top: 6px; }
    .learn-input {
      width: 100%;
      border: 1px solid #cfcfcf;
      border-radius: 8px;
      min-height: 42px;
      padding: 8px 10px;
      font-size: 0.95rem;
      box-sizing: border-box;
      margin-bottom: 10px;
    }
    .learn-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .learn-actions button {
      border: 1px solid #cfcfcf;
      border-radius: 8px;
      background: #fff;
      min-height: 42px;
      padding: 8px 12px;
      cursor: pointer;
    }
    .pdf-card {
      border: 1px solid #d5d5d5;
      border-radius: 14px;
      background: #fcfcfc;
      padding: 16px;
    }
    .pdf-frame-wrap {
      border: 1px solid #dadada;
      border-radius: 10px;
      background: #fff;
      overflow: hidden;
      height: 74vh;
      min-height: 520px;
    }
    .pdf-frame {
      width: 100%;
      height: 100%;
      border: 0;
    }
    .pdf-actions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pdf-actions a {
      border: 1px solid #cfcfcf;
      border-radius: 8px;
      background: #fff;
      color: #222;
      text-decoration: none;
      padding: 8px 12px;
    }
    .actions button {
      min-width: 110px;
      min-height: 44px;
      border: 1px solid #cfcfcf;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
    }
    .result {
      margin-top: 14px;
      padding: 10px;
      border-radius: 6px;
      display: block;
      max-width: none;
    }
    .ok { background: #d7f5dd; }
    .bad { background: #ffd9d9; }
    .neutral { background: #eef1f4; }
    #learnResult {
      text-align: center;
      font-size: 1.4rem;
      font-weight: 700;
      border: 1px solid #d3d9e0;
      min-width: min(560px, 90%);
    }
    .muted { color: #555; }
    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .config {
        position: static;
      }
      .stage-meta-inner {
        grid-template-columns: 1fr;
      }
    }
    @media (max-width: 640px) {
      .actions button {
        width: 100%;
      }
      select, button {
        min-height: 44px;
      }
      .card {
        width: 84px;
        height: 120px;
      }
    }
  </style>
</head>
<body>
  <h1>Poker Preflop Trainer (nach PDF)</h1>
  <div class="tabs">
    <button id="tabPlay" class="tab-btn active">Hand-Entscheidung</button>
    <button id="tabLearn" class="tab-btn">Tabellen-Lernen</button>
    <button id="tabPdf" class="tab-btn">Strategie-PDF</button>
  </div>

  <section id="panelPlay" class="panel active">
    <div class="layout">
      <main class="stage">
        <div class="stage-meta">
          <div class="stage-meta-inner">
            <div>
              <div class="meta-item">
                <div class="meta-label">Initiative/Verteidigung</div>
                <div id="scenario" class="scenario learn-value"></div>
              </div>
              <div class="meta-item">
                <div class="meta-label">Position</div>
                <div id="context" class="muted learn-value"></div>
              </div>
            </div>
            <button id="dealBtn" class="subtle-btn">Neues Paar</button>
          </div>
        </div>

        <div id="cards" class="cards"></div>
        <div id="actions" class="actions row"></div>
        <div id="result" class="result" style="display:none;"></div>
      </main>

      <aside class="config">
        <h2>Konfiguration</h2>
        <div class="config-controls">
          <div>
            <label for="condition">Initiative/Verteidigung</label>
            <select id="condition">
              <option value="ALL">alle</option>
              <option value="NO_RAISE">kein Raise vor mir</option>
              <option value="TIGHT_RAISE">Raise von tightem Spieler</option>
              <option value="LOOSE_RAISE">Raise von loosem Spieler</option>
            </select>
          </div>
          <div>
            <label for="position">Position</label>
            <select id="position">
              <option value="ALL">alle</option>
              <option value="EP">early</option>
              <option value="CO">CO</option>
              <option value="BTN">Dealer</option>
              <option value="BLIND">Blind</option>
            </select>
          </div>
        </div>
      </aside>
    </div>
    <div id="stats" class="stats row"></div>
  </section>

  <section id="panelLearn" class="panel">
    <div class="layout">
      <main class="learn-stage">
        <div class="learn-prompt-main">
          <div class="learn-prompt-grid">
            <div class="learn-prompt-left">
              <div class="meta-item learn-line" id="learnLineArea">
                <div class="meta-label">Initiative/Verteidigung</div>
                <span id="learnArea" class="learn-value"></span>
              </div>
              <div class="meta-item learn-line" id="learnLinePosition">
                <div class="meta-label">Position</div>
                <span id="learnPosition" class="learn-value"></span>
              </div>
              <div class="meta-item learn-line" id="learnLineAction">
                <div class="meta-label">Aktion</div>
                <span id="learnAction" class="learn-value"></span>
              </div>
              <div class="meta-item learn-line" id="learnLineCategory">
                <div class="meta-label">Kategorie</div>
                <span id="learnCategory" class="learn-value"></span>
              </div>
            </div>
            <div class="learn-prompt-right">
              <button id="learnToggleBtn" class="learn-toggle-btn">Antwort anzeigen</button>
            </div>
          </div>
        </div>
        <div class="learn-answer-wrap">
          <div id="learnResult" class="result neutral" style="display:none;"></div>
        </div>
      </main>

      <aside class="config">
        <h2>Konfiguration</h2>
        <div class="config-controls">
          <div>
            <label for="learnCfgArea">Initiative/Verteidigung</label>
            <select id="learnCfgArea">
              <option value="ALL">alle</option>
              <option value="INIT">Pre-Flop Initiative</option>
              <option value="TIGHT">Pre-Flop Verteidigung (Tight)</option>
              <option value="LOOSE">Pre-Flop Verteidigung (Loose)</option>
            </select>
          </div>
          <div>
            <label for="learnCfgPosition">Position</label>
            <select id="learnCfgPosition">
              <option value="ALL">alle</option>
              <option value="EP">EP</option>
              <option value="BLIND">Small Blind bzw. Blinds</option>
              <option value="BTN">Dealer</option>
              <option value="CO">CO</option>
            </select>
          </div>
          <div id="learnCfgActionWrap">
            <label for="learnCfgAction">Aktion</label>
            <select id="learnCfgAction">
              <option value="ALL">alle</option>
              <option value="OPEN">open-raise/auffuellen</option>
              <option value="CALL">call</option>
              <option value="3BET">3-bet</option>
            </select>
          </div>
        </div>
      </aside>
    </div>
  </section>

  <section id="panelPdf" class="panel">
    <div class="pdf-card">
      <div class="pdf-frame-wrap">
        <iframe
          class="pdf-frame"
          src="Poker_Preflop_Strategie_FINAL_v9.pdf"
          title="Poker Strategie PDF"
        ></iframe>
      </div>
      <div class="pdf-actions">
        <a href="Poker_Preflop_Strategie_FINAL_v9.pdf" target="_blank" rel="noopener noreferrer">PDF in neuem Tab</a>
        <a href="Poker_Preflop_Strategie_FINAL_v9.pdf" download>PDF herunterladen</a>
      </div>
    </div>
  </section>

  <script>
    const RANKS = ["A", "K", "Q", "J", "T", "9", "8", "7", "6", "5", "4", "3", "2"];
    const SUITS = ["h", "d", "c", "s"];

    const OPEN = {
      EP: ["22+", "A2s+", "AKo", "AQo", "KTs+", "QTs+", "JTs", "JTs-76s"],
      CO: ["22+", "A2s+", "ATo+", "K7s+", "KJo+", "Q9s+", "JTs", "JTs-43s", "J9s-53s"],
      BTN: ["22+", "A2s+", "A7o+", "K2s+", "K9o+", "Q5s+", "QTo+", "J7s+", "JTo", "JTs-43s", "T8s-53s", "T7s-96s"],
      BLIND: ["22+", "A2s+", "A2o+", "K2s+", "K2o+", "Q2s+", "Q2o+", "J2s+", "ALL_0G_S", "ALL_1G_S", "ALL_2G_S"]
    };

    const FACING_TIGHT = {
      EP: { call: ["QQ-22", "ATs+", "AKo", "KTs+", "QTs+", "JTs-76s"], threeBet: ["AA", "KK", "A5s"] },
      CO: { call: ["QQ-22", "ATs+", "AKo", "KTs+", "QTs+", "JTs-76s"], threeBet: ["AA", "KK", "A5s"] },
      BTN: { call: ["QQ-22", "ATs+", "AKo", "KTs+", "QTs+", "JTs-76s"], threeBet: ["AA", "KK", "A5s"] },
      BLINDS: { call: ["QQ-22", "ATs+", "AKo", "KTs+", "QTs+", "JTs-76s"], threeBet: ["AA", "KK", "A5s"] }
    };

    const FACING_LOOSE = {
      EP: {
        call: ["JJ-22", "AQs-A6s", "AQo", "KTs+", "QTs+", "JTs", "98s", "76s"],
        threeBet: ["AA-QQ", "A5s-A2s", "AKs", "AKo", "T9s", "87s"]
      },
      CO: {
        call: ["TT-22", "AQs-A8s", "A6s", "AQo-AJo", "K9s+", "KQo", "Q9s+", "JTs", "98s", "76s-65s", "J9s-86s"],
        threeBet: ["JJ+", "A5s-A2s", "AKs", "A7s", "AKo", "T9s", "87s", "54s"]
      },
      BTN: {
        call: ["88-22", "A9s-A6s", "AJo-ATo", "KTs-K9s", "KQo-KJo", "QTs-Q9s", "T9s-43s", "J9s-T8s", "86s", "64s-53s", "J8s-T7s"],
        threeBet: ["99+", "A5s-A2s", "AKs-ATs", "AKo-AQo", "KQs-KJs", "QJs", "JTs", "97s", "75s"]
      },
      BLINDS: {
        call: ["88-55", "ATo-A8o", "KTs-K8s", "K4s-K2s", "KJo-K9o", "QJs-QTs", "Q8s-Q5s", "Q9o+", "JTs-T9s", "J8s-96s", "J7s", "JTo-98o", "J9o", "43s", "75s-53s"],
        threeBet: ["99+", "44-22", "A2s+", "AJo+", "KJs+", "K7s-K5s", "KQo", "Q9s", "98s-54s", "J9s-86s"]
      }
    };

    const LEARN_OPEN = [
      { category: "Paare", EP: "Alle", CO: "Alle", BTN: "Alle", BLIND: "Alle" },
      { category: "Ass (Suited)", EP: "Alle", CO: "Alle", BTN: "Alle", BLIND: "Alle" },
      { category: "Ass (Offsuit)", EP: "AKo, AQo", CO: "ATo+", BTN: "A7o+", BLIND: "Alle" },
      { category: "Koenig (Suited)", EP: "KTs+", CO: "K7s+", BTN: "K2s+", BLIND: "Alle" },
      { category: "Koenig (Offsuit)", EP: "-", CO: "KJo+", BTN: "K9o+", BLIND: "Alle" },
      { category: "Dame (Suited)", EP: "QTs+", CO: "Q9s+", BTN: "Q5s+", BLIND: "Alle" },
      { category: "Dame (Offsuit)", EP: "-", CO: "-", BTN: "QTo+", BLIND: "Alle" },
      { category: "Bube (Suited)", EP: "JTs", CO: "JTs", BTN: "J7s+", BLIND: "Alle" },
      { category: "Connectors", EP: "JTs-76s", CO: "JTs-43s", BTN: "JTs-43s", BLIND: "Alle" },
      { category: "1-Gappers", EP: "-", CO: "J9s-53s", BTN: "T8s-53s", BLIND: "Alle" },
      { category: "2-Gappers", EP: "-", CO: "-", BTN: "T7s-96s", BLIND: "Alle" }
    ];

    const LEARN_TIGHT = [
      { category: "Paare", EP: { call: "QQ-22", threeBet: "AA,KK" }, CO: { call: "QQ-22", threeBet: "AA,KK" }, BTN: { call: "QQ-22", threeBet: "AA,KK" }, BLIND: { call: "QQ-22", threeBet: "AA,KK" } },
      { category: "Ass (Suited)", EP: { call: "ATs+", threeBet: "A5s" }, CO: { call: "ATs+", threeBet: "A5s" }, BTN: { call: "ATs+", threeBet: "A5s" }, BLIND: { call: "ATs+", threeBet: "A5s" } },
      { category: "Ass (Offsuit)", EP: { call: "AKo", threeBet: "-" }, CO: { call: "AKo", threeBet: "-" }, BTN: { call: "AKo", threeBet: "-" }, BLIND: { call: "AKo", threeBet: "-" } },
      { category: "Koenig (Suited)", EP: { call: "KTs+", threeBet: "-" }, CO: { call: "KTs+", threeBet: "-" }, BTN: { call: "KTs+", threeBet: "-" }, BLIND: { call: "KTs+", threeBet: "-" } },
      { category: "Dame (Suited)", EP: { call: "QTs+", threeBet: "-" }, CO: { call: "QTs+", threeBet: "-" }, BTN: { call: "QTs+", threeBet: "-" }, BLIND: { call: "QTs+", threeBet: "-" } },
      { category: "Connectors", EP: { call: "JTs-76s", threeBet: "-" }, CO: { call: "JTs-76s", threeBet: "-" }, BTN: { call: "JTs-76s", threeBet: "-" }, BLIND: { call: "JTs-76s", threeBet: "-" } }
    ];

    const LEARN_LOOSE = [
      { category: "Paare", EP: { call: "JJ-22", threeBet: "AA-QQ" }, CO: { call: "TT-22", threeBet: "JJ+" }, BTN: { call: "88-22", threeBet: "99+" }, BLIND: { call: "88-55", threeBet: "99+, 44-22" } },
      { category: "Ass (Suited)", EP: { call: "AQs-A6s", threeBet: "A5s-A2s, AKs" }, CO: { call: "AQs-A8s, A6s", threeBet: "A5s-A2s, AKs, A7s" }, BTN: { call: "A9s-A6s", threeBet: "A5s-A2s, AKs-ATs" }, BLIND: { call: "-", threeBet: "A2s+" } },
      { category: "Ass (Offsuit)", EP: { call: "AQo", threeBet: "AKo" }, CO: { call: "AQo-AJo", threeBet: "AKo" }, BTN: { call: "AJo-ATo", threeBet: "AKo-AQo" }, BLIND: { call: "ATo-A8o", threeBet: "AJo+" } },
      { category: "Koenig (Suited)", EP: { call: "KTs+", threeBet: "-" }, CO: { call: "K9s+", threeBet: "-" }, BTN: { call: "KTs-K9s", threeBet: "KQs-KJs" }, BLIND: { call: "KTs-K8s, K4s-K2s", threeBet: "KJs+, K7s-K5s" } },
      { category: "Koenig (Offsuit)", EP: { call: "-", threeBet: "-" }, CO: { call: "KQo", threeBet: "-" }, BTN: { call: "KQo-KJo", threeBet: "-" }, BLIND: { call: "KJo-K9o", threeBet: "KQo" } },
      { category: "Dame (Suited)", EP: { call: "QTs+", threeBet: "-" }, CO: { call: "Q9s+", threeBet: "-" }, BTN: { call: "QTs-Q9s", threeBet: "QJs" }, BLIND: { call: "QJs-QTs, Q8s-Q5s", threeBet: "Q9s" } },
      { category: "Dame (Offsuit)", EP: { call: "-", threeBet: "-" }, CO: { call: "-", threeBet: "-" }, BTN: { call: "-", threeBet: "-" }, BLIND: { call: "Q9o+", threeBet: "-" } },
      { category: "Bube (Suited)", EP: { call: "JTs", threeBet: "-" }, CO: { call: "JTs", threeBet: "-" }, BTN: { call: "-", threeBet: "JTs" }, BLIND: { call: "JTs-T9s, J8s-96s, J7s", threeBet: "-" } },
      { category: "Bube (Offsuit)", EP: { call: "-", threeBet: "-" }, CO: { call: "-", threeBet: "-" }, BTN: { call: "-", threeBet: "-" }, BLIND: { call: "JTo-98o, J9o", threeBet: "-" } },
      { category: "Connectors / Gappers (S)", EP: { call: "0-Gap: 98s, 76s", threeBet: "1-Gap: T9s, 87s" }, CO: { call: "0-Gap: 98s, 76s-65s | 1-Gap: J9s-86s | 2-Gap: 54s", threeBet: "T9s, 87s, 54s" }, BTN: { call: "0-Gap: T9s-43s | 1-Gap: J9s-T8s | 2-Gap: 86s, 64s-53s, J8s-T7s", threeBet: "97s, 75s" }, BLIND: { call: "0-Gap: 43s | 1-Gap: 75s-53s", threeBet: "98s-54s, J9s-86s" } }
    ];

    let current = null;
    let resolveTimer = null;
    let learnCurrent = null;
    let learnAnswerVisible = false;
    const learnQuestions = [];
    const stats = {
      total: 0,
      correct: 0,
      wrong: 0,
      byPos: {
        EP: { total: 0, correct: 0 },
        CO: { total: 0, correct: 0 },
        BTN: { total: 0, correct: 0 },
        BLIND: { total: 0, correct: 0 }
      }
    };

    function idx(r) { return RANKS.indexOf(r); }

    function canonicalHand(c1, c2) {
      const r1 = c1[0], s1 = c1[1], r2 = c2[0], s2 = c2[1];
      if (r1 === r2) return r1 + r2;
      const i1 = idx(r1), i2 = idx(r2);
      const high = i1 < i2 ? r1 : r2;
      const low = i1 < i2 ? r2 : r1;
      const suited = s1 === s2 ? "s" : "o";
      return high + low + suited;
    }

    function dealTwoCards() {
      const deck = [];
      for (const r of RANKS) {
        for (const s of SUITS) deck.push(r + s);
      }
      const a = Math.floor(Math.random() * deck.length);
      const c1 = deck.splice(a, 1)[0];
      const b = Math.floor(Math.random() * deck.length);
      const c2 = deck.splice(b, 1)[0];
      return [c1, c2];
    }

    function matchToken(token, hand) {
      token = token.replace(/\([^)]*\)/g, "").trim();
      if (!token || token === "-") return false;
      if (token === "ALL_0G_S") {
        if (hand.length !== 3 || hand[2] !== "s") return false;
        return (idx(hand[1]) - idx(hand[0]) - 1) === 0;
      }
      if (token === "ALL_1G_S") {
        if (hand.length !== 3 || hand[2] !== "s") return false;
        return (idx(hand[1]) - idx(hand[0]) - 1) === 1;
      }
      if (token === "ALL_2G_S") {
        if (hand.length !== 3 || hand[2] !== "s") return false;
        return (idx(hand[1]) - idx(hand[0]) - 1) === 2;
      }

      if (token.includes("-")) {
        const [start, end] = token.split("-").map(t => t.trim());
        if (start.length === 2 && end.length === 2 && start[0] === start[1] && end[0] === end[1]) {
          if (hand.length !== 2 || hand[0] !== hand[1]) return false;
          const h = idx(hand[0]);
          return h >= idx(start[0]) && h <= idx(end[0]);
        }

        if (start.length !== 3 || end.length !== 3) return false;
        if (hand.length !== 3) return false;
        if (start[2] !== end[2] || hand[2] !== start[2]) return false;

        const s1 = idx(start[0]), s2 = idx(start[1]);
        const e1 = idx(end[0]), e2 = idx(end[1]);
        const d1 = Math.sign(e1 - s1);
        const d2 = Math.sign(e2 - s2);

        let i1 = s1, i2 = s2;
        for (let n = 0; n < 20; n++) {
          if (hand[0] === RANKS[i1] && hand[1] === RANKS[i2]) return true;
          if (i1 === e1 && i2 === e2) break;
          if (d1 !== 0) i1 += d1;
          if (d2 !== 0) i2 += d2;
        }
        return false;
      }

      if (token.endsWith("+")) {
        const base = token.slice(0, -1);
        if (base.length === 2 && base[0] === base[1]) {
          if (hand.length !== 2 || hand[0] !== hand[1]) return false;
          return idx(hand[0]) <= idx(base[0]);
        }
        if (base.length !== 3 || hand.length !== 3) return false;
        if (hand[0] !== base[0] || hand[2] !== base[2]) return false;
        return idx(hand[1]) <= idx(base[1]);
      }

      return token === hand;
    }

    function inRange(tokens, hand) {
      for (const token of tokens) {
        if (matchToken(token, hand)) return true;
      }
      return false;
    }

    function isSBOpen(hand) {
      if (hand.length === 2) return true;
      const hi = hand[0];
      const suited = hand[2] === "s";

      if (suited && ["A", "K", "Q", "J"].includes(hi)) return true;
      if (!suited && ["A", "K", "Q", "J"].includes(hi)) return true;

      if (suited) {
        const gap = idx(hand[1]) - idx(hand[0]) - 1;
        if (gap === 0 || gap === 1 || gap === 2) return true;
      }

      return false;
    }

    function getPosition(selected) {
      if (selected !== "ALL") return selected;
      const all = ["EP", "CO", "BTN", "BLIND"];
      return all[Math.floor(Math.random() * all.length)];
    }

    function getScenario(selected) {
      if (selected !== "ALL") return selected;
      const s = ["NO_RAISE", "TIGHT_RAISE", "LOOSE_RAISE"];
      return s[Math.floor(Math.random() * s.length)];
    }

    function actionLabel(action) {
      return { OPEN: "Open Raise", CALL: "Call", "3BET": "3-Bet", FOLD: "Fold" }[action];
    }

    function joinRanges(tokens) {
      return tokens.join(", ");
    }

    function resolveCorrectAction(hand, heroPos, scenario, raiserPos) {
      if (scenario === "NO_RAISE") {
        const open = inRange(OPEN[heroPos], hand);
        return {
          correct: open ? "OPEN" : "FOLD",
          tableLabel: "Tabelle 1: Open Raising (First In)",
          reason: open
            ? hand + " ist in der Open-Range (" + joinRanges(OPEN[heroPos]) + ")."
            : hand + " ist nicht in der Open-Range (" + joinRanges(OPEN[heroPos]) + ")."
        };
      }

      let col;
      if (heroPos === "BLIND") {
        col = raiserPos === "EP" ? "EP" : "BLINDS";
      } else {
        col = heroPos;
      }

      const table = scenario === "TIGHT_RAISE" ? FACING_TIGHT : FACING_LOOSE;
      const cfg = table[col];
      const tableLabel = scenario === "TIGHT_RAISE"
        ? "Tabelle 2A: Facing Tight/Strong Raise"
        : "Tabelle 2B: Facing Loose Raise";

      if (inRange(cfg.threeBet, hand)) {
        return {
          correct: "3BET",
          tableLabel,
          reason: hand + " ist in der 3-Bet-Range (" + joinRanges(cfg.threeBet) + ")."
        };
      }
      if (inRange(cfg.call, hand)) {
        return {
          correct: "CALL",
          tableLabel,
          reason: hand + " ist in der Call-Range (" + joinRanges(cfg.call) + ")."
        };
      }
      return {
        correct: "FOLD",
        tableLabel,
        reason: hand + " ist weder in der Call-Range (" + joinRanges(cfg.call) + ") noch in der 3-Bet-Range (" + joinRanges(cfg.threeBet) + ")."
      };
    }

    function labelPos(p) {
      return p === "EP" ? "EP" : p === "BLIND" ? "Small Blind bzw. Blinds" : p === "BTN" ? "Dealer" : p;
    }

    function scenarioText(s) {
      if (s === "NO_RAISE") return "Vor dir: kein Raise";
      if (s === "TIGHT_RAISE") return "Vor dir: Raise von tightem Spieler";
      return "Vor dir: Raise von loosem Spieler";
    }

    function suitInfo(s) {
      if (s === "h") return { symbol: "♥", cls: "red" };
      if (s === "d") return { symbol: "♦", cls: "red" };
      if (s === "s") return { symbol: "♠", cls: "black" };
      return { symbol: "♣", cls: "black" };
    }

    function renderCards(c1, c2, hand, highlightNew) {
      const cards = document.getElementById("cards");
      cards.innerHTML = "";
      cards.classList.remove("played");

      for (const c of [c1, c2]) {
        const rank = c[0];
        const suit = suitInfo(c[1]);
        const el = document.createElement("div");
        el.className = "card " + suit.cls;
        if (highlightNew) el.classList.add("reveal");
        el.innerHTML =
          "<div><div class='card-rank'>" + rank + "</div><div class='card-suit'>" + suit.symbol + "</div></div>" +
          "<div class='card-suit-big'>" + suit.symbol + "</div>";
        cards.appendChild(el);
      }

      const tag = document.createElement("div");
      tag.className = "hand-tag";
      tag.textContent = "(" + hand + ")";
      cards.appendChild(tag);
    }

    function setActionButtonsDisabled(disabled) {
      const buttons = document.querySelectorAll("#actions button");
      for (const b of buttons) b.disabled = disabled;
    }

    function updateDealButton(state) {
      const b = document.getElementById("dealBtn");
      if (state === "waiting") {
        b.disabled = true;
        b.textContent = "Warte...";
      } else {
        b.disabled = false;
        b.textContent = "Neues Paar";
      }
    }

    function renderStats() {
      const hitRate = stats.total ? Math.round((stats.correct / stats.total) * 100) : 0;
      const pos = stats.byPos;
      const line = (k, label) => {
        const t = pos[k].total;
        const c = pos[k].correct;
        const p = t ? Math.round((c / t) * 100) : 0;
        return label + " " + c + "/" + t + " (" + p + "%)";
      };
      document.getElementById("stats").textContent =
        "Gesamt: " + stats.correct + "/" + stats.total + " (" + hitRate + "%) | " +
        line("EP", "early:") + " | " +
        line("CO", "CO:") + " | " +
        line("BTN", "Dealer:") + " | " +
        line("BLIND", "Blind:");
    }

    function setTab(tab) {
      document.getElementById("panelPlay").classList.toggle("active", tab === "play");
      document.getElementById("panelLearn").classList.toggle("active", tab === "learn");
      document.getElementById("panelPdf").classList.toggle("active", tab === "pdf");
      document.getElementById("tabPlay").classList.toggle("active", tab === "play");
      document.getElementById("tabLearn").classList.toggle("active", tab === "learn");
      document.getElementById("tabPdf").classList.toggle("active", tab === "pdf");
    }

    function buildLearnQuestions() {
      const posOrder = ["EP", "BLIND", "BTN", "CO"];
      const posName = { EP: "EP", BLIND: "Small Blind bzw. Blinds", BTN: "Dealer", CO: "CO" };

      for (const row of LEARN_OPEN) {
        for (const pos of posOrder) {
          learnQuestions.push({
            areaKey: "INIT",
            area: "Pre-Flop Initiative",
            category: row.category,
            positionKey: pos,
            position: posName[pos],
            actionKey: "OPEN",
            action: "open-raise/auffuellen",
            answer: row[pos]
          });
        }
      }

      for (const row of LEARN_TIGHT) {
        for (const pos of posOrder) {
          learnQuestions.push({
            areaKey: "TIGHT",
            area: "Pre-Flop Verteidigung (Tight)",
            category: row.category,
            positionKey: pos,
            position: posName[pos],
            actionKey: "CALL",
            action: "call",
            answer: row[pos].call
          });
          learnQuestions.push({
            areaKey: "TIGHT",
            area: "Pre-Flop Verteidigung (Tight)",
            category: row.category,
            positionKey: pos,
            position: posName[pos],
            actionKey: "3BET",
            action: "3-bet",
            answer: row[pos].threeBet
          });
        }
      }

      for (const row of LEARN_LOOSE) {
        for (const pos of posOrder) {
          learnQuestions.push({
            areaKey: "LOOSE",
            area: "Pre-Flop Verteidigung (Loose)",
            category: row.category,
            positionKey: pos,
            position: posName[pos],
            actionKey: "CALL",
            action: "call",
            answer: row[pos].call
          });
          learnQuestions.push({
            areaKey: "LOOSE",
            area: "Pre-Flop Verteidigung (Loose)",
            category: row.category,
            positionKey: pos,
            position: posName[pos],
            actionKey: "3BET",
            action: "3-bet",
            answer: row[pos].threeBet
          });
        }
      }
    }

    function setLearnValueState(id, fixed) {
      const el = document.getElementById(id);
      el.classList.remove("fixed", "random");
      el.classList.add(fixed ? "fixed" : "random");
    }

    function applyLearnAreaModeUI() {
      const area = document.getElementById("learnCfgArea").value;
      const actionWrap = document.getElementById("learnCfgActionWrap");
      const actionLine = document.getElementById("learnLineAction");
      const actionSelect = document.getElementById("learnCfgAction");

      if (area === "INIT") {
        actionWrap.style.display = "none";
        actionLine.classList.add("hidden");
        actionSelect.value = "OPEN";
      } else {
        actionWrap.style.display = "block";
        actionLine.classList.remove("hidden");
        if (actionSelect.value === "OPEN") actionSelect.value = "ALL";
      }
    }

    function filteredLearnQuestions() {
      const area = document.getElementById("learnCfgArea").value;
      const pos = document.getElementById("learnCfgPosition").value;
      const action = document.getElementById("learnCfgAction").value;
      const useAction = area !== "INIT";

      return learnQuestions.filter((q) =>
        (area === "ALL" || q.areaKey === area) &&
        (pos === "ALL" || q.positionKey === pos) &&
        (!useAction || action === "ALL" || q.actionKey === action)
      );
    }


    function nextLearnQuestion() {
      applyLearnAreaModeUI();
      const pool = filteredLearnQuestions();
      const res = document.getElementById("learnResult");

      if (!pool.length) {
        learnCurrent = null;
                document.getElementById("learnArea").textContent = "-";
        document.getElementById("learnPosition").textContent = "-";
        document.getElementById("learnAction").textContent = "-";
        document.getElementById("learnCategory").textContent = "-";
        setLearnValueState("learnArea", false);
        setLearnValueState("learnPosition", false);
        setLearnValueState("learnAction", false);
        setLearnValueState("learnCategory", false);
                res.style.display = "block";
        res.className = "result neutral";
        res.textContent = "Keine Frage fuer diese Filter-Kombination vorhanden.";
        document.getElementById("learnToggleBtn").textContent = "Antwort anzeigen";
        return;
      }

      const q = pool[Math.floor(Math.random() * pool.length)];
      learnCurrent = q;
      learnAnswerVisible = false;
      
      document.getElementById("learnArea").textContent = q.area;
      document.getElementById("learnPosition").textContent = q.position;
      document.getElementById("learnAction").textContent = q.action;
      document.getElementById("learnCategory").textContent = q.category;

      const areaCfg = document.getElementById("learnCfgArea").value;
      const posCfg = document.getElementById("learnCfgPosition").value;
      const actionCfg = document.getElementById("learnCfgAction").value;
      const actionVisible = areaCfg !== "INIT";

      setLearnValueState("learnArea", areaCfg !== "ALL");
      setLearnValueState("learnPosition", posCfg !== "ALL");
      if (actionVisible) setLearnValueState("learnAction", actionCfg !== "ALL");
      setLearnValueState("learnCategory", false);

            document.getElementById("learnToggleBtn").textContent = "Antwort anzeigen";
      res.style.display = "none";
    }

    function toggleLearnAnswer() {
      if (!learnCurrent) return;
      const res = document.getElementById("learnResult");
      if (!learnAnswerVisible) {
        res.style.display = "block";
        res.className = "result neutral";
        res.textContent = learnCurrent.answer;
        document.getElementById("learnToggleBtn").textContent = "Neue Kombination";
        learnAnswerVisible = true;
        return;
      }
      nextLearnQuestion();
    }

    function renderActions(scenario) {
      const actions = document.getElementById("actions");
      actions.innerHTML = "";

      const options = scenario === "NO_RAISE"
        ? [{ id: "OPEN", text: "Open Raise" }, { id: "FOLD", text: "Fold" }]
        : [{ id: "CALL", text: "Call" }, { id: "3BET", text: "3-Bet" }, { id: "FOLD", text: "Fold" }];

      for (const opt of options) {
        const b = document.createElement("button");
        b.textContent = opt.text;
        b.onclick = () => answer(opt.id);
        actions.appendChild(b);
      }
    }

    function answer(choice) {
      if (!current || current.locked) return;
      current.locked = true;
      const res = document.getElementById("result");
      const ok = choice === current.correct;
      document.getElementById("cards").classList.add("played");
      setActionButtonsDisabled(true);
      updateDealButton("waiting");

      stats.total += 1;
      stats.byPos[current.heroPos].total += 1;
      if (ok) {
        stats.correct += 1;
        stats.byPos[current.heroPos].correct += 1;
      } else {
        stats.wrong += 1;
      }
      renderStats();

      res.style.display = "inline-block";
      res.className = "result " + (ok ? "ok" : "bad");
      res.textContent = ok
        ? "✔ Richtig. " + current.reason
        : "✘ Falsch. Korrekt ist: " + actionLabel(current.correct) + ". " + current.reason;

      if (resolveTimer) clearTimeout(resolveTimer);
      resolveTimer = setTimeout(() => {
        if (ok) {
          nextHand(true);
        } else {
          updateDealButton("ready");
        }
      }, 3000);
    }

    function updatePlayValueStates() {
      const posSel = document.getElementById("position").value;
      const condSel = document.getElementById("condition").value;
      setLearnValueState("scenario", condSel !== "ALL");
      setLearnValueState("context", posSel !== "ALL");
    }

    function nextHand(highlightNew = false) {
      if (resolveTimer) {
        clearTimeout(resolveTimer);
        resolveTimer = null;
      }
      updateDealButton("ready");
      const selected = document.getElementById("position").value;
      const selectedCondition = document.getElementById("condition").value;
      const heroPos = getPosition(selected);
      const scenario = getScenario(selectedCondition);
      const [c1, c2] = dealTwoCards();
      const hand = canonicalHand(c1, c2);

      let raiserPos = null;
      if (heroPos === "BLIND" && scenario !== "NO_RAISE") {
        const possible = ["EP", "CO", "BTN"];
        raiserPos = possible[Math.floor(Math.random() * possible.length)];
      }

      const resolved = resolveCorrectAction(hand, heroPos, scenario, raiserPos);
      current = {
        hand,
        heroPos,
        scenario,
        raiserPos,
        correct: resolved.correct,
        tableLabel: resolved.tableLabel,
        reason: resolved.reason,
        locked: false
      };

      document.getElementById("context").textContent =
        "Position: " + labelPos(heroPos) +
        (raiserPos ? " | Raiser-Position: " + labelPos(raiserPos) : "");
      renderCards(c1, c2, hand, highlightNew);
      document.getElementById("scenario").textContent = scenarioText(scenario);
      updatePlayValueStates();
      document.getElementById("result").style.display = "none";
      renderActions(scenario);
      setActionButtonsDisabled(false);
    }

    document.getElementById("dealBtn").addEventListener("click", () => nextHand(true));
    document.getElementById("tabPlay").addEventListener("click", () => setTab("play"));
    document.getElementById("tabLearn").addEventListener("click", () => setTab("learn"));
    document.getElementById("tabPdf").addEventListener("click", () => setTab("pdf"));
    document.getElementById("learnToggleBtn").addEventListener("click", toggleLearnAnswer);
    document.getElementById("learnCfgArea").addEventListener("change", nextLearnQuestion);
    document.getElementById("learnCfgPosition").addEventListener("change", nextLearnQuestion);
    document.getElementById("learnCfgAction").addEventListener("change", nextLearnQuestion);
    document.getElementById("condition").addEventListener("change", () => nextHand(true));
    document.getElementById("position").addEventListener("change", () => nextHand(true));

    buildLearnQuestions();

    renderStats();
    nextHand();
    nextLearnQuestion();

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
